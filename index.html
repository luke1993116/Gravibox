<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GraviIcons">
<meta name="theme-color" content="#1c1c1e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>GraviIcons</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --safe-top:env(safe-area-inset-top,44px);
  --safe-bottom:env(safe-area-inset-bottom,34px);
}
html,body{
  width:100%;height:100%;background:#1c1c1e;
  overflow:hidden;font-family:-apple-system,'SF Pro Display',sans-serif;
  touch-action:none;user-select:none;-webkit-user-select:none;
}
#app{position:fixed;inset:0;display:flex;flex-direction:column;}

/* Splash */
#splash{
  position:fixed;inset:0;background:#1c1c1e;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  z-index:100;transition:opacity 0.5s ease,transform 0.5s ease;
}
#splash.hide{opacity:0;transform:scale(1.06);pointer-events:none;}
.sp-grid{display:grid;grid-template-columns:repeat(3,52px);gap:8px;animation:popIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both;}
@keyframes popIn{from{transform:scale(0.4) rotate(-10deg);opacity:0}to{transform:scale(1);opacity:1}}
.sp-ic{width:52px;height:52px;border-radius:13px;}
.sp-title{font-size:30px;font-weight:700;color:#fff;letter-spacing:-0.5px;animation:fadeUp 0.5s 0.3s both;}
.sp-sub{font-size:13px;color:rgba(255,255,255,0.4);animation:fadeUp 0.5s 0.45s both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Header */
#header{
  padding:calc(var(--safe-top)+8px) 16px 6px;
  display:flex;align-items:center;justify-content:space-between;z-index:10;flex-shrink:0;
}
#header h1{font-size:17px;font-weight:700;color:rgba(255,255,255,0.88);letter-spacing:-0.3px;}
.hbtns{display:flex;gap:7px;}
.hbtn{
  width:34px;height:34px;border-radius:50%;border:none;
  background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.65);
  font-size:14px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background 0.15s,transform 0.1s;
}
.hbtn:active{background:rgba(255,255,255,0.22);transform:scale(0.9);}
.hbtn.on{background:rgba(100,200,100,0.25);color:#66dd66;}

#canvas-wrap{flex:1;position:relative;overflow:hidden;min-height:0;}
canvas{display:block;width:100%;height:100%;}

#footer{padding:4px 16px calc(var(--safe-bottom)+3px);text-align:center;font-size:10px;color:rgba(255,255,255,0.18);flex-shrink:0;}

/* Mode badge */
#mode-badge{
  position:absolute;top:8px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.5);border-radius:20px;padding:3px 12px;
  font-size:11px;color:rgba(255,255,255,0.55);pointer-events:none;
  transition:color 0.3s;white-space:nowrap;display:none;
}

/* Gyro prompt */
#gyro-prompt{
  position:fixed;inset:0;background:rgba(0,0,0,0.72);
  display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:calc(var(--safe-bottom)+20px);
  z-index:50;opacity:0;pointer-events:none;transition:opacity 0.3s;
}
#gyro-prompt.show{opacity:1;pointer-events:all;}
.gp-card{background:#2c2c2e;border-radius:20px;padding:28px 24px 20px;width:calc(100% - 32px);max-width:400px;text-align:center;}
.gp-icon{font-size:48px;margin-bottom:12px;}
.gp-title{font-size:20px;font-weight:700;color:#fff;margin-bottom:8px;}
.gp-desc{font-size:14px;color:rgba(255,255,255,0.5);margin-bottom:22px;line-height:1.6;}
.gp-btn{width:100%;padding:14px;border-radius:14px;border:none;background:#30d158;color:#fff;font-size:17px;font-weight:600;cursor:pointer;margin-bottom:10px;}
.gp-skip{background:none;border:none;color:rgba(255,255,255,0.35);font-size:14px;cursor:pointer;padding:8px;}

/* Grid overlay */
#grid-overlay{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  transition:opacity 0.5s ease;overflow:hidden;
}
#grid-overlay.hidden{opacity:0;pointer-events:none;}
.hint-pulse{
  margin-top:10px;font-size:11px;color:rgba(255,255,255,0.32);white-space:nowrap;
  animation:pulse 2.2s infinite;
}
@keyframes pulse{0%,100%{opacity:0.32}50%{opacity:0.7}}

/* Install bar */
#install-bar{
  position:fixed;bottom:calc(var(--safe-bottom)+56px);left:50%;transform:translateX(-50%);
  background:rgba(44,44,46,0.96);border:1px solid rgba(255,255,255,0.1);
  border-radius:14px;padding:9px 14px;
  display:flex;align-items:center;gap:10px;z-index:20;
  max-width:calc(100% - 32px);font-size:11px;color:rgba(255,255,255,0.7);
  white-space:nowrap;animation:slideUp 0.4s 2.5s both;
}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(14px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.ib-close{margin-left:4px;background:none;border:none;color:rgba(255,255,255,0.3);cursor:pointer;font-size:15px;}
</style>
</head>
<body>

<div id="splash">
  <div class="sp-grid" id="spGrid"></div>
  <div class="sp-title">GraviIcons</div>
  <div class="sp-sub">开启陀螺仪，让图标随重力飞起来</div>
</div>

<div id="app">
  <div id="header">
    <h1>GraviIcons</h1>
    <div class="hbtns">
      <button class="hbtn" id="gyroBtn">📱</button>
      <button class="hbtn" id="homeBtn" style="display:none" title="归位">🏠</button>
    </div>
  </div>
  <div id="canvas-wrap">
    <div id="grid-overlay">
      <div id="grid-rows"></div>
      <div class="hint-pulse">开启陀螺仪后图标随重力滑动</div>
    </div>
    <canvas id="c" style="display:none"></canvas>
    <div id="mode-badge"></div>
  </div>
  <div id="footer">长按磁吸 · 🏠归位 · 摇手机归位</div>
</div>

<div id="gyro-prompt">
  <div class="gp-card">
    <div class="gp-icon">📱</div>
    <div class="gp-title">开启陀螺仪</div>
    <div class="gp-desc">倾斜手机让图标像冰块滑动<br>长按屏幕触发核聚变磁吸 · 摇手机归位</div>
    <button class="gp-btn" id="gyroAllowBtn">✦ 开启并体验</button>
    <button class="gp-skip" id="gyroSkipBtn">稍后再说</button>
  </div>
</div>

<div id="install-bar" style="display:none">
  <span>⬆️</span><span>分享 → 添加到主屏幕</span>
  <button class="ib-close" id="installClose">✕</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// iPhone grid specs (from reference, scaled to CSS px at ~3x)
// Reference uses pt; we map 1pt ≈ 2px for typical 390pt-wide phone
// We'll compute dynamically based on actual screen width
// ═══════════════════════════════════════════════════════════

// iPhone layout constants (in pt, 1pt = ~1 CSS px on non-retina web)
// For 390pt wide (iPhone 14): icon=60pt, hgap=18pt, vgap=23pt, margin=20pt
// We scale all proportionally to actual canvas width
const COLS = 4;

function computeLayout(canvasW, canvasH) {
  // Scale factor: reference is 390pt wide with 20pt margins and 4 cols
  const scale = canvasW / 390;
  const iconPt  = 60 * scale;        // icon size
  const hGapPt  = 18 * scale;        // horizontal gap between icons
  const vGapPt  = 23 * scale;        // vertical gap (icon bottom to next icon top)
  const marginPt = 20 * scale;       // left/right margin
  const labelH   = 18 * scale;       // label area height below icon

  // Cell = icon + label + vgap
  const cellW = iconPt + hGapPt;
  const cellH = iconPt + labelH + vGapPt;

  // Grid top start (after safe area approximation)
  const topPad = 62 * scale;

  return { iconPt, hGapPt, vGapPt, marginPt, labelH, cellW, cellH, topPad, scale };
}

function computeHomePositions(canvasW, canvasH) {
  const L = computeLayout(canvasW, canvasH);
  const totalW = COLS * L.iconPt + (COLS-1) * L.hGapPt;
  const startX = (canvasW - totalW) / 2 + L.iconPt/2;
  const startY = L.topPad + L.iconPt/2;

  return ICONS.map((_,i) => ({
    x: startX + (i % COLS) * (L.iconPt + L.hGapPt),
    y: startY + Math.floor(i / COLS) * (L.iconPt + L.labelH + L.vGapPt)
  }));
}

// ═══════════════════════════════════════════════════════════
// ICONS
// ═══════════════════════════════════════════════════════════
const ICONS = [
  {label:'商店',  grad:['#1a8cff','#0055cc'], draw:drawStore},
  {label:'音乐',  grad:['#cc44ff','#7700cc'],  draw:drawMusic},
  {label:'相机',  grad:['#888','#444'],         draw:drawCamera},
  {label:'时钟',  grad:['#333','#111'],          draw:drawClock},
  {label:'邮件',  grad:['#55aaff','#1a66cc'],  draw:drawMail},
  {label:'消息',  grad:['#33cc44','#1a8829'],  draw:drawMessage},
  {label:'电话',  grad:['#44cc44','#228822'],  draw:drawPhone},
  {label:'导航',  grad:['#3399ff','#1155bb'],  draw:drawCompass},
  {label:'天气',  grad:['#55aaee','#2277bb'],  draw:drawWeather},
  {label:'设置',  grad:['#888','#555'],         draw:drawSettings},
  {label:'股票',  grad:['#0d2233','#1a4466'],  draw:drawStocks},
  {label:'视频',  grad:['#333','#111'],          draw:drawClapper},
  {label:'地图',  grad:['#77ccff','#bbe8ff'],  draw:drawMap},
  {label:'备忘录',grad:['#ffdd44','#ffaa00'],  draw:drawNotes},
  {label:'播客',  grad:['#aa44ff','#6600cc'],  draw:drawPodcast},
  {label:'通讯录',grad:['#cc9944','#885500'],  draw:drawContacts},
  {label:'照片',  grad:['#ffffff','#dddddd'],  draw:drawPhotos},
  {label:'计算器',grad:['#2a2a2a','#111'],      draw:drawCalculator},
  {label:'健康',  grad:['#ff3366','#cc0044'],  draw:drawHealth},
  {label:'钱包',  grad:['#1a1a1a','#000'],      draw:drawWallet},
  {label:'游戏',  grad:['#ff6633','#cc3300'],  draw:drawGame},
  {label:'雨天',  grad:['#667799','#445566'],  draw:drawRain},
  {label:'图书',  grad:['#ff8833','#cc5500'],  draw:drawBook},
  {label:'手电',  grad:['#222','#000'],          draw:drawFlash},
];

function rc(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();c.fill();}
function circ(c,cx,cy,r,col){c.beginPath();c.arc(cx,cy,r,0,Math.PI*2);c.fillStyle=col;c.fill();}
function ln(c,x1,y1,x2,y2,w,col){c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.strokeStyle=col;c.lineWidth=w;c.stroke();}

function drawStore(c,s){c.strokeStyle='#fff';c.lineWidth=s*.07;c.lineCap='round';c.beginPath();c.arc(s*.5,s*.5,s*.3,0,Math.PI*2);c.stroke();c.beginPath();c.arc(s*.5,s*.5,s*.15,0,Math.PI*2);c.stroke();ln(c,s*.5,s*.2,s*.5,s*.8,s*.07,'#fff');ln(c,s*.2,s*.5,s*.8,s*.5,s*.07,'#fff');}
function drawMusic(c,s){c.fillStyle='#fff';c.beginPath();c.ellipse(s*.36,s*.65,s*.1,s*.08,-.4,0,Math.PI*2);c.fill();c.beginPath();c.ellipse(s*.62,s*.57,s*.1,s*.08,-.4,0,Math.PI*2);c.fill();c.fillRect(s*.44,s*.28,s*.045,s*.38);c.fillRect(s*.7,s*.22,s*.045,s*.36);c.fillRect(s*.44,s*.26,s*.3,s*.07);}
function drawCamera(c,s){c.fillStyle='#bbb';rc(c,s*.12,s*.3,s*.76,s*.44,s*.08);c.fillStyle='#aaa';rc(c,s*.34,s*.2,s*.2,s*.12,s*.04);c.fillStyle='#eee';rc(c,s*.62,s*.22,s*.14,s*.09,s*.03);circ(c,s*.5,s*.52,s*.14,'#555');circ(c,s*.5,s*.52,s*.1,'#333');circ(c,s*.5,s*.52,s*.06,'#111');circ(c,s*.43,s*.46,s*.02,'rgba(255,255,255,0.5)');}
function drawClock(c,s){circ(c,s*.5,s*.5,s*.38,'#fff');circ(c,s*.5,s*.5,s*.34,'#f5f5f5');for(let i=0;i<12;i++){const a=i/12*Math.PI*2-Math.PI/2,r1=i%3===0?.25:.28;ln(c,s*(.5+Math.cos(a)*r1),s*(.5+Math.sin(a)*r1),s*(.5+Math.cos(a)*.32),s*(.5+Math.sin(a)*.32),s*.03,'#444');}c.lineCap='round';ln(c,s*.5,s*.5,s*(.5+Math.cos(Math.PI*.5)*.18),s*(.5+Math.sin(Math.PI*.5)*.18),s*.045,'#222');ln(c,s*.5,s*.5,s*.5,s*.22,s*.04,'#222');ln(c,s*.5,s*.58,s*.5,s*.2,s*.025,'#ff2200');circ(c,s*.5,s*.5,s*.03,'#333');}
function drawMail(c,s){c.fillStyle='#fff';rc(c,s*.12,s*.3,s*.76,s*.44,s*.06);c.strokeStyle='#5599ee';c.lineWidth=s*.04;c.lineJoin='round';c.beginPath();c.moveTo(s*.14,s*.32);c.lineTo(s*.5,s*.56);c.lineTo(s*.86,s*.32);c.stroke();}
function drawMessage(c,s){c.fillStyle='#fff';c.beginPath();c.moveTo(s*.2,s*.24);c.lineTo(s*.8,s*.24);c.quadraticCurveTo(s*.88,s*.24,s*.88,s*.4);c.lineTo(s*.88,s*.62);c.quadraticCurveTo(s*.88,s*.72,s*.78,s*.72);c.lineTo(s*.42,s*.72);c.lineTo(s*.28,s*.86);c.lineTo(s*.3,s*.72);c.lineTo(s*.22,s*.72);c.quadraticCurveTo(s*.12,s*.72,s*.12,s*.62);c.lineTo(s*.12,s*.4);c.quadraticCurveTo(s*.12,s*.24,s*.2,s*.24);c.closePath();c.fill();}
function drawPhone(c,s){c.fillStyle='#fff';c.save();c.translate(s*.5,s*.5);c.rotate(.22*Math.PI);c.beginPath();c.ellipse(-s*.14,-s*.22,s*.1,s*.17,0,0,Math.PI*2);c.fill();c.beginPath();c.ellipse(s*.14,s*.22,s*.1,s*.17,0,0,Math.PI*2);c.fill();c.fillRect(-s*.08,-s*.07,s*.16,s*.14);c.restore();}
function drawCompass(c,s){circ(c,s*.5,s*.5,s*.36,'rgba(100,180,255,0.25)');c.strokeStyle='rgba(255,255,255,0.55)';c.lineWidth=s*.04;c.beginPath();c.arc(s*.5,s*.5,s*.34,0,Math.PI*2);c.stroke();c.fillStyle='rgba(255,255,255,0.5)';c.font=`bold ${s*.11}px sans-serif`;c.textAlign='center';c.fillText('N',s*.5,s*.22);c.fillText('S',s*.5,s*.86);c.fillText('E',s*.83,s*.55);c.fillText('W',s*.17,s*.55);c.save();c.translate(s*.5,s*.5);c.rotate(.6);c.fillStyle='#ff4422';c.beginPath();c.moveTo(0,-s*.24);c.lineTo(s*.05,0);c.lineTo(0,s*.06);c.lineTo(-s*.05,0);c.closePath();c.fill();c.fillStyle='#ddd';c.beginPath();c.moveTo(0,s*.06);c.lineTo(s*.05,0);c.lineTo(0,s*.24);c.lineTo(-s*.05,0);c.closePath();c.fill();c.restore();circ(c,s*.5,s*.5,s*.04,'#fff');}
function drawWeather(c,s){for(let i=0;i<8;i++){const a=i/8*Math.PI*2;ln(c,s*(.44+Math.cos(a)*.22),s*(.46+Math.sin(a)*.22),s*(.44+Math.cos(a)*.3),s*(.46+Math.sin(a)*.3),s*.04,'#ffcc00');}circ(c,s*.44,s*.46,s*.16,'#ffdd00');circ(c,s*.44,s*.46,s*.11,'#ffee55');c.fillStyle='#fff';c.font=`bold ${s*.16}px sans-serif`;c.textAlign='left';c.fillText('23°',s*.08,s*.86);}
function drawSettings(c,s){const t=8;c.fillStyle='#ccc';c.beginPath();for(let i=0;i<t;i++){const a1=i/t*Math.PI*2,a2=(i+.38)/t*Math.PI*2,a3=(i+.62)/t*Math.PI*2,a4=(i+1)/t*Math.PI*2;if(i===0)c.moveTo(s*(.5+Math.cos(a1)*.22),s*(.5+Math.sin(a1)*.22));c.lineTo(s*(.5+Math.cos(a1)*.33),s*(.5+Math.sin(a1)*.33));c.arc(s*.5,s*.5,s*.33,a1,a2);c.lineTo(s*(.5+Math.cos(a3)*.22),s*(.5+Math.sin(a3)*.22));c.arc(s*.5,s*.5,s*.22,a3,a4);}c.closePath();c.fill();circ(c,s*.5,s*.5,s*.12,'#666');}
function drawStocks(c,s){[.38,.55,.72].forEach(y=>{ln(c,s*.08,s*y,s*.9,s*y,s*.015,'rgba(255,255,255,0.1)');});const pts=[[.08,.72],[.22,.54],[.36,.62],[.5,.36],[.62,.48],[.75,.26],[.9,.34]];c.strokeStyle='#00ccff';c.lineWidth=s*.038;c.lineJoin='round';c.lineCap='round';c.beginPath();pts.forEach(([x,y],i)=>i?c.lineTo(s*x,s*y):c.moveTo(s*x,s*y));c.stroke();c.lineTo(s*.9,s*.88);c.lineTo(s*.08,s*.88);c.closePath();c.fillStyle='rgba(0,200,255,0.12)';c.fill();}
function drawClapper(c,s){c.fillStyle='#ddd';rc(c,s*.1,s*.3,s*.8,s*.46,s*.06);c.fillStyle='#222';rc(c,s*.1,s*.18,s*.8,s*.16,s*.05);c.fillStyle='#ddd';for(let i=0;i<4;i++){c.save();c.translate(s*(.2+i*.2),s*.19);c.rotate(-.32);c.fillRect(-s*.04,-s*.09,s*.08,s*.16);c.restore();}}
function drawMap(c,s){c.strokeStyle='rgba(255,255,255,0.8)';c.lineWidth=s*.06;c.lineJoin='round';c.beginPath();c.moveTo(s*.18,s*.1);c.lineTo(s*.5,s*.55);c.lineTo(s*.82,s*.1);c.stroke();c.beginPath();c.moveTo(s*.08,s*.9);c.lineTo(s*.5,s*.55);c.lineTo(s*.92,s*.9);c.stroke();circ(c,s*.5,s*.36,s*.14,'#ff3344');circ(c,s*.5,s*.36,s*.07,'rgba(255,255,255,0.9)');c.fillStyle='#ff3344';c.beginPath();c.moveTo(s*.41,s*.44);c.lineTo(s*.59,s*.44);c.lineTo(s*.5,s*.6);c.closePath();c.fill();}
function drawNotes(c,s){c.fillStyle='#fffde0';rc(c,s*.14,s*.1,s*.72,s*.82,s*.05);[.34,.46,.58,.7,.8].forEach(y=>{ln(c,s*.26,s*y,s*.8,s*y,s*.022,'rgba(200,160,0,0.35)');});ln(c,s*.28,s*.12,s*.28,s*.9,s*.022,'rgba(255,80,80,0.45)');c.fillStyle='#8b5e3c';c.fillRect(s*.13,s*.1,s*.055,s*.82);}
function drawPodcast(c,s){circ(c,s*.5,s*.4,s*.2,'rgba(255,255,255,0.9)');c.strokeStyle='rgba(255,255,255,0.55)';c.lineWidth=s*.04;c.lineCap='round';[[.3,-.85,-.15],[.4,-.82,-.18],[.5,-.78,-.22]].forEach(([r,a1,a2])=>{c.beginPath();c.arc(s*.5,s*.4,s*r,Math.PI*a1,Math.PI*a2);c.stroke();c.beginPath();c.arc(s*.5,s*.4,s*r,Math.PI*(1-a2),Math.PI*(1-a1));c.stroke();});ln(c,s*.5,s*.6,s*.5,s*.78,s*.04,'rgba(255,255,255,0.8)');ln(c,s*.34,s*.78,s*.66,s*.78,s*.04,'rgba(255,255,255,0.8)');}
function drawContacts(c,s){c.fillStyle='#fff';circ(c,s*.44,s*.34,s*.15,'#fff');c.beginPath();c.arc(s*.44,s*.82,s*.26,-Math.PI,0);c.fill();['A','B','C','D','E'].forEach((l,i)=>{c.fillStyle='rgba(200,140,60,0.7)';c.fillRect(s*.8,s*(.2+i*.13),s*.09,s*.1);c.fillStyle='#fff';c.font=`${s*.07}px sans-serif`;c.textAlign='center';c.fillText(l,s*.845,s*(.285+i*.13));});}
function drawPhotos(c,s){[['#ff6699',0],['#ff9933',.52],['#ffee00',1.05],['#66cc33',1.57],['#3399ff',2.1],['#aa44ff',2.62],['#ff3366',3.14],['#ff6600',3.67]].forEach(([col,a])=>{c.fillStyle=col;c.beginPath();c.ellipse(s*(.5+Math.cos(a)*.2),s*(.5+Math.sin(a)*.2),s*.12,s*.19,a,0,Math.PI*2);c.fill();});circ(c,s*.5,s*.5,s*.12,'#ffee44');}

const ICON_RENDER = 180; // high-res offscreen

const iconCache = ICONS.map(icon => {
  const oc = document.createElement('canvas');
  oc.width = oc.height = ICON_RENDER;
  const c2 = oc.getContext('2d');
  const S = ICON_RENDER, r = S * 0.22;
  c2.beginPath();
  c2.moveTo(r,0);c2.lineTo(S-r,0);c2.quadraticCurveTo(S,0,S,r);
  c2.lineTo(S,S-r);c2.quadraticCurveTo(S,S,S-r,S);
  c2.lineTo(r,S);c2.quadraticCurveTo(0,S,0,S-r);
  c2.lineTo(0,r);c2.quadraticCurveTo(0,0,r,0);c2.closePath();
  const grd = c2.createLinearGradient(0,0,0,S);
  grd.addColorStop(0,icon.grad[0]);grd.addColorStop(1,icon.grad[1]);
  c2.fillStyle=grd;c2.fill();
  c2.save();c2.clip();
  const shine = c2.createLinearGradient(0,0,0,S*.5);
  shine.addColorStop(0,'rgba(255,255,255,0.38)');shine.addColorStop(1,'rgba(255,255,255,0)');
  c2.fillStyle=shine;c2.fillRect(0,0,S,S*.5);
  icon.draw(c2,S);
  c2.restore();
  return oc;
});

// BUILD GRID OVERLAY (exact iPhone spacing)

function buildGrid(canvasW) {
  const container = document.getElementById('grid-rows');
  container.innerHTML = '';

  const scale = Math.min(canvasW / 390, 1.2);
  const iconPx  = Math.round(60 * scale);
  const hGapPx  = Math.round(18 * scale);
  const vGapPx  = Math.round(8 * scale);   // smaller visual gap in grid overlay
  const labelH  = Math.round(18 * scale);

  container.style.cssText = `display:flex;flex-direction:column;align-items:center;gap:${vGapPx}px;padding-top:${Math.round(16*scale)}px;`;

  for (let row = 0; row < Math.ceil(ICONS.length/COLS); row++) {
    const rowEl = document.createElement('div');
    rowEl.style.cssText = `display:flex;gap:${hGapPx}px;`;
    for (let col = 0; col < COLS; col++) {
      const idx = row*COLS+col;
      if (idx >= ICONS.length) break;
      const item = document.createElement('div');
      item.style.cssText = `display:flex;flex-direction:column;align-items:center;`;
      const ic = document.createElement('canvas');
      ic.width = ic.height = iconPx;
      ic.style.cssText = `width:${iconPx}px;height:${iconPx}px;border-radius:${Math.round(iconPx*0.22)}px;display:block;box-shadow:0 2px 12px rgba(0,0,0,0.55);`;
      ic.getContext('2d').drawImage(iconCache[idx],0,0,iconPx,iconPx);
      const lbl = document.createElement('div');
      lbl.style.cssText = `font-size:${Math.round(10*scale)}px;color:rgba(255,255,255,0.88);margin-top:3px;text-align:center;text-shadow:0 1px 3px rgba(0,0,0,0.9);max-width:${iconPx+hGapPx*0.6}px;overflow:hidden;white-space:nowrap;`;
      lbl.textContent = ICONS[idx].label;
      item.appendChild(ic);item.appendChild(lbl);
      rowEl.appendChild(item);
    }
    container.appendChild(rowEl);
  }
}

// ═══════════════════════════════════════════════════════════
// CANVAS + PHYSICS
// ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvas-wrap');
const modeBadge = document.getElementById('mode-badge');

let W, H;
let gravity = {x:0, y:0};
let boxes = [];
let gyroOn = false;
let physicsActive = false;
let dragging = null, lastPos = null;

// mode: 'normal' | 'magnet' | 'homing'
let mode = 'normal';
let magnetPos = null;
// Per-icon magnet multipliers (randomised each activation for chaos)
let magnetMults = [];
let touchHoldTimer = null;
let homingTargets = [];

// Ripples
let ripples = [];

function resize() {
  const rect = wrap.getBoundingClientRect();
  W = rect.width; H = rect.height;
  canvas.width  = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  canvas.style.width  = W+'px';
  canvas.style.height = H+'px';
  ctx.scale(devicePixelRatio, devicePixelRatio);
  buildGrid(W);
}

// Dynamic icon display size based on layout
function getIconDisplaySize() {
  const L = computeLayout(W, H);
  return L.iconPt;
}
function getPhysR() {
  return getIconDisplaySize() * 0.48;
}

function initBoxesAtGrid() {
  const homes = computeHomePositions(W, H);
  boxes = ICONS.map((_,i) => ({
    id: i,
    x: homes[i].x, y: homes[i].y,
    vx:0, vy:0, angle:0, av:0,
    // random magnet multiplier refreshed each magnet activation
    magnetMult: 1
  }));
}

// Physics constants
const RESTITUTION  = 0.52;   // collision bounce
const WALL_REST    = 0.32;   // wall bounce (less)
const FLOOR_FRIC   = 0.65;   // sliding on walls (more friction)
const AIR          = 0.980;  // air drag
const G_SCALE      = 24;
const ROT_DECAY    = 0.91;   // angular velocity decays slower → spins longer
const MAX_ROT      = 0.18;   // allow real rotation now (was 0.025)
const SURF_FRIC    = 0.35;   // surface friction between boxes (generates spin)
// Magnet
const MAGNET_BASE  = 26;
// Homing
const HOMING_K     = 0.10;
const HOMING_DAMP  = 0.80;

function step() {
  if (!physicsActive) return;
  const PHYS_R = getPhysR();
  const BOX    = getIconDisplaySize();

  if (mode === 'homing') {
    let allDone = true;
    for (const b of boxes) {
      const home = homingTargets[b.id];
      const dx = home.x - b.x, dy = home.y - b.y;
      b.vx += dx * HOMING_K;
      b.vy += dy * HOMING_K;
      b.vx *= HOMING_DAMP;
      b.vy *= HOMING_DAMP;
      b.av *= 0.65;
      b.angle *= 0.82;
      b.x += b.vx; b.y += b.vy;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if (dist > 2 || Math.abs(b.vx)+Math.abs(b.vy) > 0.4) allDone = false;
    }
    if (allDone) {
      for (const b of boxes) {
        const home = homingTargets[b.id];
        b.x=home.x; b.y=home.y; b.vx=0; b.vy=0; b.angle=0; b.av=0;
      }
      endHoming();
    }
    return;
  }

  for (const b of boxes) {
    if (dragging && dragging.id===b.id) continue;

    if (mode==='magnet' && magnetPos) {
      const dx = magnetPos.x-b.x, dy = magnetPos.y-b.y;
      const dist = Math.sqrt(dx*dx+dy*dy)+1;
      // Force: constant strong pull, scaled by per-icon random multiplier
      // No distance falloff so even far icons accelerate chaotically
      const f = MAGNET_BASE * b.magnetMult;
      b.vx += (dx/dist)*f*0.016;
      b.vy += (dy/dist)*f*0.016;
    } else {
      b.vx += gravity.x*G_SCALE*0.016;
      b.vy += gravity.y*G_SCALE*0.016;
    }

    b.vx *= AIR; b.vy *= AIR;
    b.av *= ROT_DECAY;
    // No hard clamp on MAX_ROT during normal play — let them spin naturally
    // Only damp when nearly stopped (like a block settling on a surface)
    b.x += b.vx; b.y += b.vy;
    b.angle += b.av;

    const h = PHYS_R;
    // Walls: normal bounce + friction generates angular velocity (realistic tumble)
    if (b.x-h<0)  {b.x=h;    b.vx= Math.abs(b.vx)*WALL_REST; const fri=b.vy*FLOOR_FRIC; b.av+=(b.vy-fri)*SURF_FRIC*0.05; b.vy*=FLOOR_FRIC;}
    if (b.x+h>W)  {b.x=W-h;  b.vx=-Math.abs(b.vx)*WALL_REST; const fri=b.vy*FLOOR_FRIC; b.av-=(b.vy-fri)*SURF_FRIC*0.05; b.vy*=FLOOR_FRIC;}
    if (b.y-h<0)  {b.y=h;    b.vy= Math.abs(b.vy)*WALL_REST;  const fri=b.vx*FLOOR_FRIC; b.av-=(b.vx-fri)*SURF_FRIC*0.05; b.vx*=FLOOR_FRIC;}
    if (b.y+h>H)  {b.y=H-h;  b.vy=-Math.abs(b.vy)*WALL_REST;  const fri=b.vx*FLOOR_FRIC; b.av+=(b.vx-fri)*SURF_FRIC*0.05; b.vx*=FLOOR_FRIC;}

    // Settle: when slow, damp spin toward zero like friction on a surface
    const speed = Math.sqrt(b.vx*b.vx+b.vy*b.vy);
    if (speed < 0.8) { b.av *= 0.88; }
  }

  // AABB collisions with surface friction → realistic spin (3 passes)
  for (let iter=0;iter<3;iter++) {
    for (let i=0;i<boxes.length;i++) {
      for (let j=i+1;j<boxes.length;j++) {
        const a=boxes[i],b=boxes[j];
        if (dragging&&(dragging.id===a.id||dragging.id===b.id)) continue;
        const dx=b.x-a.x, dy=b.y-a.y;
        const ox=(PHYS_R+PHYS_R)-Math.abs(dx);
        const oy=(PHYS_R+PHYS_R)-Math.abs(dy);
        if (ox<=0||oy<=0) continue;

        if (ox<oy) {
          // Horizontal collision — normal is X, tangent is Y
          const sep=ox/2+0.5, sign=dx>0?1:-1;
          a.x-=sign*sep; b.x+=sign*sep;
          const rvn=b.vx-a.vx;  // relative normal velocity
          if (rvn*sign<0){
            const imp=rvn*0.5*(1+RESTITUTION);
            a.vx+=imp; b.vx-=imp;
          }
          // Tangential friction → spin
          const rvt=b.vy-a.vy;  // relative tangential velocity
          const fricImp=rvt*SURF_FRIC*0.5;
          a.vy+=fricImp; b.vy-=fricImp;
          // Torque: friction force × lever arm (half box size)
          const lever=PHYS_R*0.5;
          a.av -= fricImp*lever*0.012 * sign;
          b.av += fricImp*lever*0.012 * sign;
        } else {
          // Vertical collision — normal is Y, tangent is X
          const sep=oy/2+0.5, sign=dy>0?1:-1;
          a.y-=sign*sep; b.y+=sign*sep;
          const rvn=b.vy-a.vy;
          if (rvn*sign<0){
            const imp=rvn*0.5*(1+RESTITUTION);
            a.vy+=imp; b.vy-=imp;
          }
          // Tangential friction → spin
          const rvt=b.vx-a.vx;
          const fricImp=rvt*SURF_FRIC*0.5;
          a.vx+=fricImp; b.vx-=fricImp;
          const lever=PHYS_R*0.5;
          a.av += fricImp*lever*0.012 * sign;
          b.av -= fricImp*lever*0.012 * sign;
        }
        // Clamp angular velocity so it feels physical (not infinite spin)
        a.av=Math.max(-MAX_ROT,Math.min(MAX_ROT,a.av));
        b.av=Math.max(-MAX_ROT,Math.min(MAX_ROT,b.av));
      }
    }
  }
}

function render() {
  ctx.clearRect(0,0,W,H);
  const BOX = getIconDisplaySize();

  // Ripples
  ripples = ripples.filter(r=>r.alpha>0.015);
  ripples.forEach(r=>{r.r+=5;r.alpha*=0.86;});
  for (const r of ripples) {
    ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,Math.PI*2);
    ctx.strokeStyle=`rgba(80,200,255,${r.alpha})`;
    ctx.lineWidth=2;ctx.stroke();
  }

  // Magnet indicator
  if (mode==='magnet'&&magnetPos) {
    const mx=magnetPos.x, my=magnetPos.y;
    // Outer glow ring
    const grad = ctx.createRadialGradient(mx,my,4,mx,my,60);
    grad.addColorStop(0,'rgba(50,180,255,0.25)');
    grad.addColorStop(1,'rgba(50,180,255,0)');
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.arc(mx,my,60,0,Math.PI*2);ctx.fill();
    // Crosshair
    ctx.setLineDash([4,4]);
    ctx.strokeStyle='rgba(80,210,255,0.6)';ctx.lineWidth=1.5;
    ln(ctx,mx-36,my,mx+36,my,1.5,'rgba(80,210,255,0.6)');
    ln(ctx,mx,my-36,mx,my+36,1.5,'rgba(80,210,255,0.6)');
    ctx.setLineDash([]);
    ctx.beginPath();ctx.arc(mx,my,16,0,Math.PI*2);
    ctx.strokeStyle='rgba(80,220,255,0.75)';ctx.lineWidth=2;ctx.stroke();
    circ(ctx,mx,my,5,'rgba(80,220,255,0.95)');
  }

  // Homing ghost targets
  if (mode==='homing') {
    ctx.fillStyle='rgba(255,255,255,0.04)';
    for (const t of homingTargets) {
      ctx.beginPath();ctx.arc(t.x,t.y,getPhysR(),0,Math.PI*2);ctx.fill();
    }
  }

  // Draw icons
  for (const b of boxes) {
    ctx.save();
    ctx.translate(b.x,b.y);
    ctx.rotate(b.angle);
    ctx.shadowColor='rgba(0,0,0,0.6)';
    ctx.shadowBlur=dragging&&dragging.id===b.id?32:18;
    ctx.shadowOffsetY=5;
    ctx.drawImage(iconCache[b.id],-BOX/2,-BOX/2,BOX,BOX);
    ctx.shadowBlur=0;ctx.shadowOffsetY=0;
    ctx.fillStyle='rgba(255,255,255,0.88)';
    ctx.font=`${Math.round(BOX*0.155)}px -apple-system,sans-serif`;
    ctx.textAlign='center';
    ctx.fillText(ICONS[b.id].label,0,BOX/2+BOX*0.24);
    ctx.restore();
  }
}

function loop(){step();render();requestAnimationFrame(loop);}

// ── Activate physics ──────────────────────────────────────
function activatePhysics() {
  physicsActive = true;
  const overlay = document.getElementById('grid-overlay');
  overlay.classList.add('hidden');
  setTimeout(()=>{overlay.style.display='none';},600);
  canvas.style.display='block';
  modeBadge.style.display='block';
  document.getElementById('homeBtn').style.display='flex';
  document.getElementById('footer').textContent='长按磁吸 · 🏠归位 · 摇手机归位';
  setBadge('重力模式','rgba(255,255,255,0.5)');
  initBoxesAtGrid();
  loop();
  setTimeout(()=>{gravity={x:0,y:1};},80);
}

function setBadge(text,col){modeBadge.textContent=text;modeBadge.style.color=col||'rgba(255,255,255,0.5)';}

// ── Homing ────────────────────────────────────────────────
function triggerHoming() {
  if (mode==='homing') return;
  mode='homing';
  magnetPos=null;
  homingTargets=computeHomePositions(W,H);
  setBadge('🏠 归位中…','rgba(255,220,80,0.9)');
}
function endHoming() {
  mode='normal';
  gravity={x:0,y:1};
  setBadge('重力模式','rgba(255,255,255,0.5)');
}

// ── Magnet activation ─────────────────────────────────────
function startMagnet(pos) {
  mode='magnet';
  magnetPos=pos;
  // Give each icon a random multiplier 0.4–2.8 for chaotic nuclear effect
  for (const b of boxes) {
    b.magnetMult = 0.4 + Math.random()*2.4;
  }
  setBadge('🧲 核聚变磁吸','rgba(80,220,255,0.9)');
  ripples.push({x:pos.x,y:pos.y,r:8,alpha:0.9});
  ripples.push({x:pos.x,y:pos.y,r:20,alpha:0.55});
}
function endMagnet() {
  mode='normal';
  magnetPos=null;
  setBadge('重力模式','rgba(255,255,255,0.5)');
}

// ── Touch ─────────────────────────────────────────────────
function getPos(e){
  const rect=canvas.getBoundingClientRect();
  const src=e.touches?e.touches[0]:e;
  return{x:src.clientX-rect.left,y:src.clientY-rect.top};
}
function findBox(px,py){
  const PHYS_R=getPhysR();
  for(let i=boxes.length-1;i>=0;i--){
    const b=boxes[i];
    if(Math.abs(px-b.x)<PHYS_R&&Math.abs(py-b.y)<PHYS_R) return b;
  }
  return null;
}

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(mode==='homing') return;
  const p=getPos(e);
  const hit=findBox(p.x,p.y);
  if(hit){dragging=hit;lastPos=p;return;}
  // Long-press = magnet (short threshold for instant feel)
  touchHoldTimer=setTimeout(()=>startMagnet(p),80);
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(mode==='homing') return;
  const p=getPos(e);
  if(dragging){
    dragging.vx=(p.x-lastPos.x)*0.65;
    dragging.vy=(p.y-lastPos.y)*0.65;
    dragging.x=p.x;dragging.y=p.y;lastPos=p;return;
  }
  if(mode==='magnet'){
    magnetPos=p;
    if(Math.random()<0.3) ripples.push({x:p.x,y:p.y,r:4,alpha:0.4});
  }
},{passive:false});

canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  clearTimeout(touchHoldTimer);
  if(dragging){dragging.vx*=1.5;dragging.vy*=1.5;dragging.av=0;dragging=null;return;}
  if(mode==='magnet') endMagnet();
},{passive:false});

// Mouse (desktop)
canvas.addEventListener('mousedown',e=>{
  if(mode==='homing') return;
  const p=getPos(e);
  const hit=findBox(p.x,p.y);
  if(hit){dragging=hit;return;}
  startMagnet(p);
});
canvas.addEventListener('mousemove',e=>{
  if(mode==='homing') return;
  if(dragging){
    const p=getPos(e);
    dragging.vx=(p.x-dragging.x)*0.65;dragging.vy=(p.y-dragging.y)*0.65;
    dragging.x=p.x;dragging.y=p.y;return;
  }
  if(mode==='magnet'){magnetPos=getPos(e);return;}
  if(!gyroOn){
    const rect=canvas.getBoundingClientRect();
    gravity.x=((e.clientX-rect.left)/W*2-1)*1.6;
    gravity.y=((e.clientY-rect.top)/H*2-1)*1.6;
  }
});
canvas.addEventListener('mouseup',e=>{
  if(dragging){dragging.vx*=1.5;dragging.vy*=1.5;dragging.av=0;dragging=null;return;}
  if(mode==='magnet') endMagnet();
});

document.getElementById('homeBtn').addEventListener('click',()=>{
  if(physicsActive) triggerHoming();
});

// ═══════════════════════════════════════════════════════════
// SHAKE DETECTION
// 摇一下 → 开启陀螺仪（无需询问）
// 摇两下 → 归位 + 关闭陀螺仪
// ═══════════════════════════════════════════════════════════
let lastAccel={x:0,y:0,z:0},shakeCount=0,lastShakeTime=0;
let gyroListenerAdded=false;

function enableGyroSilent(){
  if(!gyroListenerAdded){
    gyroListenerAdded=true;
    window.addEventListener('deviceorientation',e=>{
      if(!gyroOn||mode==='homing'||mode==='magnet') return;
      gravity.x= Math.sin((e.gamma||0)*Math.PI/180)*2.4;
      gravity.y= Math.sin((e.beta||0) *Math.PI/180)*2.4;
    });
  }
  gyroOn=true;
  gyroBtn.classList.add('on');gyroBtn.textContent='🌀';
  if(!physicsActive) activatePhysics();
  setBadge('🌀 陀螺仪已开启','rgba(100,220,100,0.85)');
}

function disableGyro(){
  gyroOn=false;
  gyroBtn.classList.remove('on');gyroBtn.textContent='📱';
  gravity={x:0,y:1};
  setBadge('重力模式','rgba(255,255,255,0.5)');
}

window.addEventListener('devicemotion',e=>{
  const acc=e.accelerationIncludingGravity;if(!acc)return;
  const dx=acc.x-lastAccel.x,dy=acc.y-lastAccel.y,dz=acc.z-lastAccel.z;
  const shake=Math.sqrt(dx*dx+dy*dy+dz*dz);
  lastAccel={x:acc.x,y:acc.y,z:acc.z};
  const now=Date.now();
  if(shake>18&&now-lastShakeTime>280){
    lastShakeTime=now;shakeCount++;
    if(shakeCount>=2&&physicsActive&&mode!=='homing'){
      shakeCount=0;
      triggerHoming();
      setTimeout(()=>disableGyro(),200);
    } else if(shakeCount===1&&physicsActive&&!gyroOn){
      enableGyroSilent();
    }
    setTimeout(()=>{shakeCount=Math.max(0,shakeCount-1);},700);
  }
});

// ═══════════════════════════════════════════════════════════
// GYROSCOPE  (button + prompt)
// ═══════════════════════════════════════════════════════════
const gyroBtn=document.getElementById('gyroBtn');
const gyroPrompt=document.getElementById('gyro-prompt');

async function requestAndEnableGyro(){
  if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
    try{const p=await DeviceOrientationEvent.requestPermission();if(p==='granted')enableGyroSilent();}
    catch(e){enableGyroSilent();}
  } else {
    enableGyroSilent();
  }
}

gyroBtn.addEventListener('click',async()=>{
  if(gyroOn){disableGyro();return;}
  if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
    gyroPrompt.classList.add('show');
  } else {
    enableGyroSilent();
    if(!physicsActive) activatePhysics();
  }
});
document.getElementById('gyroAllowBtn').addEventListener('click',async()=>{
  gyroPrompt.classList.remove('show');
  await requestAndEnableGyro();
});
document.getElementById('gyroSkipBtn').addEventListener('click',()=>gyroPrompt.classList.remove('show'));

window.addEventListener('resize',()=>{resize();if(physicsActive)initBoxesAtGrid();});
resize();

  const g=document.getElementById('spGrid');

    ic.style.animationDelay=`${i*.05}s`;

if(isIOS&&!window.navigator.standalone){
