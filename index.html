<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GraviIcons">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>GraviIcons</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root {
    --safe-top: env(safe-area-inset-top, 44px);
    --safe-bottom: env(safe-area-inset-bottom, 34px);
  }
  html, body {
    width:100%; height:100%; background:#1c1c1e;
    overflow:hidden;
    font-family:-apple-system,'SF Pro Display',sans-serif;
    touch-action:none; user-select:none; -webkit-user-select:none;
  }
  #app { position:fixed; inset:0; display:flex; flex-direction:column; }

  /* Splash */
  #splash {
    position:fixed; inset:0; background:#1c1c1e;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
    z-index:100; transition:opacity 0.5s ease, transform 0.5s ease;
  }
  #splash.hide { opacity:0; transform:scale(1.06); pointer-events:none; }
  .sp-grid { display:grid; grid-template-columns:repeat(3,52px); gap:8px; animation:popIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both; }
  @keyframes popIn { from{transform:scale(0.4) rotate(-10deg);opacity:0} to{transform:scale(1);opacity:1} }
  .sp-ic { width:52px; height:52px; border-radius:13px; }
  .sp-title { font-size:30px; font-weight:700; color:#fff; letter-spacing:-0.5px; animation:fadeUp 0.5s 0.3s both; }
  .sp-sub   { font-size:13px; color:rgba(255,255,255,0.4); animation:fadeUp 0.5s 0.45s both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  /* Header */
  #header {
    padding:calc(var(--safe-top) + 8px) 18px 8px;
    display:flex; align-items:center; justify-content:space-between; z-index:10; flex-shrink:0;
  }
  #header h1 { font-size:19px; font-weight:700; color:rgba(255,255,255,0.9); letter-spacing:-0.3px; }
  .hbtns { display:flex; gap:8px; }
  .hbtn {
    width:36px; height:36px; border-radius:50%; border:none;
    background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.65);
    font-size:15px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:background 0.15s, transform 0.1s;
  }
  .hbtn:active { background:rgba(255,255,255,0.2); transform:scale(0.9); }
  .hbtn.on { background:rgba(100,200,100,0.25); color:#66dd66; }

  #canvas-wrap { flex:1; position:relative; overflow:hidden; min-height:0; }
  canvas { display:block; width:100%; height:100%; }

  #footer { padding:6px 20px calc(var(--safe-bottom)+4px); text-align:center; font-size:11px; color:rgba(255,255,255,0.2); flex-shrink:0; }

  /* Gyro prompt */
  #gyro-prompt {
    position:fixed; inset:0; background:rgba(0,0,0,0.72);
    display:flex; align-items:flex-end; justify-content:center;
    padding-bottom:calc(var(--safe-bottom)+20px);
    z-index:50; opacity:0; pointer-events:none; transition:opacity 0.3s;
  }
  #gyro-prompt.show { opacity:1; pointer-events:all; }
  .gp-card { background:#2c2c2e; border-radius:20px; padding:28px 24px 20px; width:calc(100% - 32px); max-width:400px; text-align:center; }
  .gp-icon { font-size:48px; margin-bottom:12px; }
  .gp-title { font-size:20px; font-weight:700; color:#fff; margin-bottom:8px; }
  .gp-desc  { font-size:14px; color:rgba(255,255,255,0.5); margin-bottom:22px; line-height:1.6; }
  .gp-btn { width:100%; padding:14px; border-radius:14px; border:none; background:#30d158; color:#fff; font-size:17px; font-weight:600; cursor:pointer; margin-bottom:10px; }
  .gp-skip { background:none; border:none; color:rgba(255,255,255,0.35); font-size:14px; cursor:pointer; padding:8px; }

  /* Install bar */
  #install-bar {
    position:fixed; bottom:calc(var(--safe-bottom)+60px); left:50%; transform:translateX(-50%);
    background:rgba(44,44,46,0.96); border:1px solid rgba(255,255,255,0.1);
    border-radius:14px; padding:10px 16px;
    display:flex; align-items:center; gap:10px; z-index:20;
    max-width:calc(100% - 32px); font-size:12px; color:rgba(255,255,255,0.75);
    white-space:nowrap; animation:slideUp 0.4s 2.5s both;
  }
  @keyframes slideUp { from{opacity:0;transform:translateX(-50%) translateY(16px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
  .ib-close { margin-left:4px; background:none; border:none; color:rgba(255,255,255,0.3); cursor:pointer; font-size:15px; }

  /* Grid overlay (shown before gyro) */
  #grid-overlay {
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center;
    padding-top:16px; gap:0;
    transition:opacity 0.6s ease;
    pointer-events:none;
  }
  #grid-overlay.hidden { opacity:0; }
  .grid-row { display:flex; gap:0; }
  .grid-item {
    display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
    padding:8px 6px 4px;
    pointer-events:all; cursor:pointer;
  }
  .grid-canvas { border-radius:14px; display:block; }
  .grid-label { font-size:11px; color:rgba(255,255,255,0.85); margin-top:4px; text-align:center; }

  .hint-text {
    position:absolute; bottom:20px; left:50%; transform:translateX(-50%);
    font-size:13px; color:rgba(255,255,255,0.4); white-space:nowrap;
    animation:pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:0.8} }
</style>
</head>
<body>

<div id="splash">
  <div class="sp-grid" id="spGrid"></div>
  <div class="sp-title">GraviIcons</div>
  <div class="sp-sub">开启陀螺仪，让图标随重力飞起来</div>
</div>

<div id="app">
  <div id="header">
    <h1>GraviIcons</h1>
    <div class="hbtns">
      <button class="hbtn" id="gyroBtn" title="开启陀螺仪">📱</button>
      <button class="hbtn" id="shakeBtn" title="抖一抖" style="display:none">💨</button>
    </div>
  </div>
  <div id="canvas-wrap">
    <!-- Grid view (before gyro) -->
    <div id="grid-overlay">
      <div id="grid-rows"></div>
      <div class="hint-text">点击上方按钮开启陀螺仪 →</div>
    </div>
    <!-- Physics canvas (after gyro) -->
    <canvas id="c" style="display:none"></canvas>
  </div>
  <div id="footer" id="footer-txt">整齐排列中 · 开启陀螺仪后图标随重力滑动</div>
</div>

<div id="gyro-prompt">
  <div class="gp-card">
    <div class="gp-icon">📱</div>
    <div class="gp-title">开启陀螺仪</div>
    <div class="gp-desc">开启后，倾斜手机，图标会像冰块一样<br>在屏幕里随重力滑动碰撞</div>
    <button class="gp-btn" id="gyroAllowBtn">✦ 开启并体验</button>
    <button class="gp-skip" id="gyroSkipBtn">稍后再说</button>
  </div>
</div>

<div id="install-bar" style="display:none">
  <span>⬆️</span>
  <span>分享 → 添加到主屏幕，像 App 一样使用</span>
  <button class="ib-close" id="installClose">✕</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// ICON DEFINITIONS
// ═══════════════════════════════════════════════════════════
const ICONS = [
  { label:'商店',   grad:['#1a8cff','#0055cc'],  draw: drawStore },
  { label:'音乐',   grad:['#cc44ff','#7700cc'],   draw: drawMusic },
  { label:'相机',   grad:['#888','#444'],          draw: drawCamera },
  { label:'时钟',   grad:['#333','#111'],           draw: drawClock },
  { label:'邮件',   grad:['#55aaff','#1a66cc'],   draw: drawMail },
  { label:'消息',   grad:['#33cc44','#1a8829'],   draw: drawMessage },
  { label:'电话',   grad:['#44cc44','#228822'],   draw: drawPhone },
  { label:'导航',   grad:['#3399ff','#1155bb'],   draw: drawCompass },
  { label:'天气',   grad:['#55aaee','#2277bb'],   draw: drawWeather },
  { label:'设置',   grad:['#888','#555'],          draw: drawSettings },
  { label:'股票',   grad:['#0d2233','#1a4466'],   draw: drawStocks },
  { label:'视频',   grad:['#333','#111'],           draw: drawClapper },
  { label:'地图',   grad:['#77ccff','#bbe8ff'],   draw: drawMap },
  { label:'备忘录', grad:['#ffdd44','#ffaa00'],   draw: drawNotes },
  { label:'播客',   grad:['#aa44ff','#6600cc'],   draw: drawPodcast },
  { label:'通讯录', grad:['#cc9944','#885500'],   draw: drawContacts },
  { label:'照片',   grad:['#ffffff','#dddddd'],   draw: drawPhotos },
  { label:'计算器', grad:['#2a2a2a','#111'],       draw: drawCalculator },
  { label:'健康',   grad:['#ff3366','#cc0044'],   draw: drawHealth },
  { label:'钱包',   grad:['#1a1a1a','#000'],       draw: drawWallet },
  { label:'游戏',   grad:['#ff6633','#cc3300'],   draw: drawGame },
  { label:'雨天',   grad:['#667799','#445566'],   draw: drawRain },
  { label:'图书',   grad:['#ff8833','#cc5500'],   draw: drawBook },
  { label:'手电',   grad:['#222','#000'],           draw: drawFlash },
];

// ─── Drawing helpers ─────────────────────────────────────
function rc(c,x,y,w,h,r){ c.beginPath(); c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.quadraticCurveTo(x+w,y,x+w,y+r); c.lineTo(x+w,y+h-r); c.quadraticCurveTo(x+w,y+h,x+w-r,y+h); c.lineTo(x+r,y+h); c.quadraticCurveTo(x,y+h,x,y+h-r); c.lineTo(x,y+r); c.quadraticCurveTo(x,y,x+r,y); c.closePath(); c.fill(); }
function circ(c,cx,cy,r,col){ c.beginPath(); c.arc(cx,cy,r,0,Math.PI*2); c.fillStyle=col; c.fill(); }
function ln(c,x1,y1,x2,y2,w,col){ c.beginPath(); c.moveTo(x1,y1); c.lineTo(x2,y2); c.strokeStyle=col; c.lineWidth=w; c.stroke(); }

function drawStore(c,s){ c.strokeStyle='#fff'; c.lineWidth=s*0.07; c.lineCap='round'; c.beginPath(); c.arc(s*.5,s*.5,s*.3,0,Math.PI*2); c.stroke(); c.beginPath(); c.arc(s*.5,s*.5,s*.15,0,Math.PI*2); c.stroke(); ln(c,s*.5,s*.2,s*.5,s*.8,s*.07,'#fff'); ln(c,s*.2,s*.5,s*.8,s*.5,s*.07,'#fff'); }
function drawMusic(c,s){ c.fillStyle='#fff'; c.beginPath(); c.ellipse(s*.36,s*.65,s*.1,s*.08,-.4,0,Math.PI*2); c.fill(); c.beginPath(); c.ellipse(s*.62,s*.57,s*.1,s*.08,-.4,0,Math.PI*2); c.fill(); c.fillRect(s*.44,s*.28,s*.045,s*.38); c.fillRect(s*.7,s*.22,s*.045,s*.36); c.fillRect(s*.44,s*.26,s*.3,s*.07); }
function drawCamera(c,s){ c.fillStyle='#bbb'; rc(c,s*.12,s*.3,s*.76,s*.44,s*.08); c.fillStyle='#aaa'; rc(c,s*.34,s*.2,s*.2,s*.12,s*.04); c.fillStyle='#eee'; rc(c,s*.62,s*.22,s*.14,s*.09,s*.03); circ(c,s*.5,s*.52,s*.14,'#555'); circ(c,s*.5,s*.52,s*.1,'#333'); circ(c,s*.5,s*.52,s*.06,'#111'); circ(c,s*.43,s*.46,s*.02,'rgba(255,255,255,0.5)'); }
function drawClock(c,s){ circ(c,s*.5,s*.5,s*.38,'#fff'); circ(c,s*.5,s*.5,s*.34,'#f5f5f5'); c.strokeStyle='#444'; c.lineWidth=s*.03; for(let i=0;i<12;i++){const a=i/12*Math.PI*2-Math.PI/2,r1=i%3===0?.25:.28; ln(c,s*(.5+Math.cos(a)*r1),s*(.5+Math.sin(a)*r1),s*(.5+Math.cos(a)*.32),s*(.5+Math.sin(a)*.32),s*.03,'#444');} c.lineCap='round'; ln(c,s*.5,s*.5,s*(.5+Math.cos(Math.PI*.5)*.18),s*(.5+Math.sin(Math.PI*.5)*.18),s*.045,'#222'); ln(c,s*.5,s*.5,s*.5,s*.22,s*.04,'#222'); ln(c,s*.5,s*.58,s*.5,s*.2,s*.025,'#ff2200'); circ(c,s*.5,s*.5,s*.03,'#333'); }
function drawMail(c,s){ c.fillStyle='#fff'; rc(c,s*.12,s*.3,s*.76,s*.44,s*.06); c.strokeStyle='#5599ee'; c.lineWidth=s*.04; c.lineJoin='round'; c.beginPath(); c.moveTo(s*.14,s*.32); c.lineTo(s*.5,s*.56); c.lineTo(s*.86,s*.32); c.stroke(); }
function drawMessage(c,s){ c.fillStyle='#fff'; c.beginPath(); c.moveTo(s*.2,s*.24); c.lineTo(s*.8,s*.24); c.quadraticCurveTo(s*.88,s*.24,s*.88,s*.4); c.lineTo(s*.88,s*.62); c.quadraticCurveTo(s*.88,s*.72,s*.78,s*.72); c.lineTo(s*.42,s*.72); c.lineTo(s*.28,s*.86); c.lineTo(s*.3,s*.72); c.lineTo(s*.22,s*.72); c.quadraticCurveTo(s*.12,s*.72,s*.12,s*.62); c.lineTo(s*.12,s*.4); c.quadraticCurveTo(s*.12,s*.24,s*.2,s*.24); c.closePath(); c.fill(); }
function drawPhone(c,s){ c.fillStyle='#fff'; c.save(); c.translate(s*.5,s*.5); c.rotate(.22*Math.PI); c.beginPath(); c.ellipse(-s*.14,-s*.22,s*.1,s*.17,0,0,Math.PI*2); c.fill(); c.beginPath(); c.ellipse(s*.14,s*.22,s*.1,s*.17,0,0,Math.PI*2); c.fill(); c.fillRect(-s*.08,-s*.07,s*.16,s*.14); c.restore(); }
function drawCompass(c,s){ circ(c,s*.5,s*.5,s*.36,'rgba(100,180,255,0.25)'); c.strokeStyle='rgba(255,255,255,0.55)'; c.lineWidth=s*.04; c.beginPath(); c.arc(s*.5,s*.5,s*.34,0,Math.PI*2); c.stroke(); c.fillStyle='rgba(255,255,255,0.5)'; c.font=`bold ${s*.11}px sans-serif`; c.textAlign='center'; c.fillText('N',s*.5,s*.22); c.fillText('S',s*.5,s*.86); c.fillText('E',s*.83,s*.55); c.fillText('W',s*.17,s*.55); c.save(); c.translate(s*.5,s*.5); c.rotate(.6); c.fillStyle='#ff4422'; c.beginPath(); c.moveTo(0,-s*.24); c.lineTo(s*.05,0); c.lineTo(0,s*.06); c.lineTo(-s*.05,0); c.closePath(); c.fill(); c.fillStyle='#ddd'; c.beginPath(); c.moveTo(0,s*.06); c.lineTo(s*.05,0); c.lineTo(0,s*.24); c.lineTo(-s*.05,0); c.closePath(); c.fill(); c.restore(); circ(c,s*.5,s*.5,s*.04,'#fff'); }
function drawWeather(c,s){ c.strokeStyle='#ffcc00'; c.lineWidth=s*.04; c.lineCap='round'; for(let i=0;i<8;i++){const a=i/8*Math.PI*2; ln(c,s*(.44+Math.cos(a)*.22),s*(.46+Math.sin(a)*.22),s*(.44+Math.cos(a)*.3),s*(.46+Math.sin(a)*.3),s*.04,'#ffcc00');} circ(c,s*.44,s*.46,s*.16,'#ffdd00'); circ(c,s*.44,s*.46,s*.11,'#ffee55'); c.fillStyle='#fff'; c.font=`bold ${s*.16}px sans-serif`; c.textAlign='left'; c.fillText('23°',s*.08,s*.86); }
function drawSettings(c,s){ const t=8; c.fillStyle='#ccc'; c.beginPath(); for(let i=0;i<t;i++){const a1=i/t*Math.PI*2,a2=(i+.38)/t*Math.PI*2,a3=(i+.62)/t*Math.PI*2,a4=(i+1)/t*Math.PI*2; if(i===0)c.moveTo(s*(.5+Math.cos(a1)*.22),s*(.5+Math.sin(a1)*.22)); c.lineTo(s*(.5+Math.cos(a1)*.33),s*(.5+Math.sin(a1)*.33)); c.arc(s*.5,s*.5,s*.33,a1,a2); c.lineTo(s*(.5+Math.cos(a3)*.22),s*(.5+Math.sin(a3)*.22)); c.arc(s*.5,s*.5,s*.22,a3,a4);} c.closePath(); c.fill(); circ(c,s*.5,s*.5,s*.12,'#666'); }
function drawStocks(c,s){ c.strokeStyle='rgba(255,255,255,0.1)'; c.lineWidth=s*.015; [.38,.55,.72].forEach(y=>{ln(c,s*.08,s*y,s*.9,s*y,s*.015,'rgba(255,255,255,0.1)');}); const pts=[[.08,.72],[.22,.54],[.36,.62],[.5,.36],[.62,.48],[.75,.26],[.9,.34]]; c.strokeStyle='#00ccff'; c.lineWidth=s*.038; c.lineJoin='round'; c.lineCap='round'; c.beginPath(); pts.forEach(([x,y],i)=>i?c.lineTo(s*x,s*y):c.moveTo(s*x,s*y)); c.stroke(); c.lineTo(s*.9,s*.88); c.lineTo(s*.08,s*.88); c.closePath(); c.fillStyle='rgba(0,200,255,0.12)'; c.fill(); }
function drawClapper(c,s){ c.fillStyle='#ddd'; rc(c,s*.1,s*.3,s*.8,s*.46,s*.06); c.fillStyle='#222'; rc(c,s*.1,s*.18,s*.8,s*.16,s*.05); c.fillStyle='#ddd'; for(let i=0;i<4;i++){c.save(); c.translate(s*(.2+i*.2),s*.19); c.rotate(-.32); c.fillRect(-s*.04,-s*.09,s*.08,s*.16); c.restore();} }
function drawMap(c,s){ c.strokeStyle='rgba(255,255,255,0.8)'; c.lineWidth=s*.06; c.lineJoin='round'; c.beginPath(); c.moveTo(s*.18,s*.1); c.lineTo(s*.5,s*.55); c.lineTo(s*.82,s*.1); c.stroke(); c.beginPath(); c.moveTo(s*.08,s*.9); c.lineTo(s*.5,s*.55); c.lineTo(s*.92,s*.9); c.stroke(); circ(c,s*.5,s*.36,s*.14,'#ff3344'); circ(c,s*.5,s*.36,s*.07,'rgba(255,255,255,0.9)'); c.fillStyle='#ff3344'; c.beginPath(); c.moveTo(s*.41,s*.44); c.lineTo(s*.59,s*.44); c.lineTo(s*.5,s*.6); c.closePath(); c.fill(); }
function drawNotes(c,s){ c.fillStyle='#fffde0'; rc(c,s*.14,s*.1,s*.72,s*.82,s*.05); c.strokeStyle='rgba(200,160,0,0.35)'; c.lineWidth=s*.022; [.34,.46,.58,.7,.8].forEach(y=>{ln(c,s*.26,s*y,s*.8,s*y,s*.022,'rgba(200,160,0,0.35)');}); ln(c,s*.28,s*.12,s*.28,s*.9,s*.022,'rgba(255,80,80,0.45)'); c.fillStyle='#8b5e3c'; c.fillRect(s*.13,s*.1,s*.055,s*.82); }
function drawPodcast(c,s){ circ(c,s*.5,s*.4,s*.2,'rgba(255,255,255,0.9)'); c.strokeStyle='rgba(255,255,255,0.55)'; c.lineWidth=s*.04; c.lineCap='round'; [[.3,-.85,-.15],[.4,-.82,-.18],[.5,-.78,-.22]].forEach(([r,a1,a2])=>{c.beginPath(); c.arc(s*.5,s*.4,s*r,Math.PI*a1,Math.PI*a2); c.stroke(); c.beginPath(); c.arc(s*.5,s*.4,s*r,Math.PI*(1-a2),Math.PI*(1-a1)); c.stroke();}); ln(c,s*.5,s*.6,s*.5,s*.78,s*.04,'rgba(255,255,255,0.8)'); ln(c,s*.34,s*.78,s*.66,s*.78,s*.04,'rgba(255,255,255,0.8)'); }
function drawContacts(c,s){ c.fillStyle='#fff'; circ(c,s*.44,s*.34,s*.15,'#fff'); c.beginPath(); c.arc(s*.44,s*.82,s*.26,-Math.PI,0); c.fill(); ['A','B','C','D','E'].forEach((l,i)=>{ c.fillStyle='rgba(200,140,60,0.7)'; c.fillRect(s*.8,s*(.2+i*.13),s*.09,s*.1); c.fillStyle='#fff'; c.font=`${s*.07}px sans-serif`; c.textAlign='center'; c.fillText(l,s*.845,s*(.285+i*.13)); }); }
function drawPhotos(c,s){ const p=[['#ff6699',0],['#ff9933',.52],['#ffee00',1.05],['#66cc33',1.57],['#3399ff',2.1],['#aa44ff',2.62],['#ff3366',3.14],['#ff6600',3.67]]; p.forEach(([col,a])=>{c.fillStyle=col; c.beginPath(); c.ellipse(s*(.5+Math.cos(a)*.2),s*(.5+Math.sin(a)*.2),s*.12,s*.19,a,0,Math.PI*2); c.fill();}); circ(c,s*.5,s*.5,s*.12,'#ffee44'); }

// PRE-RENDER ICONS
// ═══════════════════════════════════════════════════════════
const ICON_SIZE = 60;
const iconCache = ICONS.map(icon => {
  const oc = document.createElement('canvas');
  const S = ICON_SIZE * 2; oc.width = oc.height = S;
  const oc2 = oc.getContext('2d');
  const r = S * 0.22;
  oc2.beginPath();
  oc2.moveTo(r,0); oc2.lineTo(S-r,0); oc2.quadraticCurveTo(S,0,S,r);
  oc2.lineTo(S,S-r); oc2.quadraticCurveTo(S,S,S-r,S);
  oc2.lineTo(r,S); oc2.quadraticCurveTo(0,S,0,S-r);
  oc2.lineTo(0,r); oc2.quadraticCurveTo(0,0,r,0); oc2.closePath();
  const grd = oc2.createLinearGradient(0,0,0,S);
  grd.addColorStop(0,icon.grad[0]); grd.addColorStop(1,icon.grad[1]);
  oc2.fillStyle=grd; oc2.fill();
  oc2.save(); oc2.clip();
  const shine = oc2.createLinearGradient(0,0,0,S*.52);
  shine.addColorStop(0,'rgba(255,255,255,0.38)'); shine.addColorStop(1,'rgba(255,255,255,0)');
  oc2.fillStyle=shine; oc2.fillRect(0,0,S,S*.52);
  icon.draw(oc2, S);
  oc2.restore();
  return oc;
});

// ═══════════════════════════════════════════════════════════
// BUILD GRID VIEW (iPhone-style, before gyro)
// ═══════════════════════════════════════════════════════════
const COLS = 4;
const ITEM_W = 76; // icon + padding
const ICON_DISPLAY = 56;

function buildGrid() {
  const container = document.getElementById('grid-rows');
  container.style.display = 'flex';
  container.style.flexDirection = 'column';
  container.style.alignItems = 'center';
  container.style.gap = '4px';

  for (let row = 0; row < Math.ceil(ICONS.length / COLS); row++) {
    const rowEl = document.createElement('div');
    rowEl.style.cssText = 'display:flex;gap:4px;';
    for (let col = 0; col < COLS; col++) {
      const idx = row * COLS + col;
      if (idx >= ICONS.length) break;
      const item = document.createElement('div');
      item.style.cssText = `display:flex;flex-direction:column;align-items:center;padding:6px 4px 2px;width:${ITEM_W}px;`;
      const ic = document.createElement('canvas');
      ic.width = ic.height = ICON_DISPLAY;
      ic.style.cssText = `width:${ICON_DISPLAY}px;height:${ICON_DISPLAY}px;border-radius:14px;display:block;box-shadow:0 2px 8px rgba(0,0,0,0.4);`;
      ic.getContext('2d').drawImage(iconCache[idx], 0, 0, ICON_DISPLAY, ICON_DISPLAY);
      const lbl = document.createElement('div');
      lbl.style.cssText = 'font-size:11px;color:rgba(255,255,255,0.85);margin-top:4px;text-align:center;text-shadow:0 1px 3px rgba(0,0,0,0.8);';
      lbl.textContent = ICONS[idx].label;
      item.appendChild(ic); item.appendChild(lbl);
      rowEl.appendChild(item);
    }
    container.appendChild(rowEl);
  }
}
buildGrid();

// ═══════════════════════════════════════════════════════════
// PHYSICS ENGINE
// ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvas-wrap');

let W, H;
const BOX = 62;   // icon rendered size
const PHYS_R = 30; // half-size for physics (tighter than visual for no-overlap)
let gravity = { x: 0, y: 0 };
let boxes = [];
let gyroOn = false;
let physicsActive = false;
let dragging = null, lastPos = null;

function resize() {
  const rect = wrap.getBoundingClientRect();
  W = rect.width; H = rect.height;
  canvas.width  = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(devicePixelRatio, devicePixelRatio);
}

// Initialize boxes at grid positions (same layout as grid overlay)
function initBoxesAtGrid() {
  const gap = 4;
  const totalW = COLS * ITEM_W + (COLS-1) * gap;
  const startX = (W - totalW) / 2 + ITEM_W/2;
  const startY = 30 + ITEM_W/2;

  boxes = ICONS.map((icon, i) => {
    const col = i % COLS;
    const row = Math.floor(i / COLS);
    return {
      id: i,
      x: startX + col * (ITEM_W + gap),
      y: startY + row * (ITEM_W + gap),
      vx: 0, vy: 0,
      angle: 0, av: 0,
      targetAngle: 0
    };
  });
}

// ── Physics constants (ice-cube feel) ───────────────────
const RESTITUTION = 0.18;   // low bounce (ice doesn't bounce much)
const FRICTION    = 0.75;   // high friction when hitting walls
const AIR         = 0.988;  // light air resistance
const FLOOR_FRIC  = 0.94;   // sliding friction on floor
const G_SCALE     = 11;     // gravity strength
const MAX_ROT     = 0.04;   // max rotation per frame (very limited)
const ROT_DECAY   = 0.88;   // angular velocity decays fast

function step() {
  if (!physicsActive) return;
  const half = PHYS_R;

  for (const b of boxes) {
    if (dragging && dragging.id === b.id) continue;

    // Gravity
    b.vx += gravity.x * G_SCALE * 0.016;
    b.vy += gravity.y * G_SCALE * 0.016;

    // Air friction
    b.vx *= AIR;
    b.vy *= AIR;

    // Angular velocity decays quickly → icons stay mostly upright
    b.av *= ROT_DECAY;

    // Clamp angular velocity so icons don't spin wildly
    b.av = Math.max(-MAX_ROT, Math.min(MAX_ROT, b.av));

    // Integrate position
    b.x += b.vx;
    b.y += b.vy;

    // Smoothly return angle toward 0 (upright) when slow
    const speed = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
    if (speed < 1.5) {
      b.av *= 0.7;
      b.angle *= 0.92; // drift back to upright
    } else {
      b.angle += b.av;
    }

    // Wall collisions — AABB style (no rotation from walls)
    if (b.x - half < 0) {
      b.x = half;
      b.vx = Math.abs(b.vx) * RESTITUTION;
      b.vy *= FRICTION;
      b.av = 0; // don't spin from walls
    }
    if (b.x + half > W) {
      b.x = W - half;
      b.vx = -Math.abs(b.vx) * RESTITUTION;
      b.vy *= FRICTION;
      b.av = 0;
    }
    if (b.y - half < 0) {
      b.y = half;
      b.vy = Math.abs(b.vy) * RESTITUTION;
      b.vx *= FLOOR_FRIC;
      b.av = 0;
    }
    if (b.y + half > H) {
      b.y = H - half;
      b.vy = -Math.abs(b.vy) * RESTITUTION;
      b.vx *= FLOOR_FRIC;
      b.av = 0;
    }
  }

  // ── Box-box collisions (AABB — squares, no rotation from collision) ──
  const maxIter = 3; // multiple passes for stability
  for (let iter = 0; iter < maxIter; iter++) {
    for (let i = 0; i < boxes.length; i++) {
      for (let j = i+1; j < boxes.length; j++) {
        const a = boxes[i], b = boxes[j];
        if (dragging && (dragging.id===a.id || dragging.id===b.id)) continue;

        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const overlapX = (PHYS_R + PHYS_R) - Math.abs(dx);
        const overlapY = (PHYS_R + PHYS_R) - Math.abs(dy);

        if (overlapX <= 0 || overlapY <= 0) continue; // no collision

        // Resolve along minimum overlap axis
        if (overlapX < overlapY) {
          // Horizontal push
          const sep = overlapX / 2 + 0.5;
          const sign = dx > 0 ? 1 : -1;
          a.x -= sign * sep;
          b.x += sign * sep;
          // Velocity exchange (elastic-ish but damped)
          const relV = b.vx - a.vx;
          if (relV * sign < 0) {
            const imp = relV * 0.5 * RESTITUTION;
            a.vx += imp; b.vx -= imp;
          }
          // tiny friction on perpendicular
          a.vy *= 0.98; b.vy *= 0.98;
        } else {
          // Vertical push
          const sep = overlapY / 2 + 0.5;
          const sign = dy > 0 ? 1 : -1;
          a.y -= sign * sep;
          b.y += sign * sep;
          const relV = b.vy - a.vy;
          if (relV * sign < 0) {
            const imp = relV * 0.5 * RESTITUTION;
            a.vy += imp; b.vy -= imp;
          }
          a.vx *= 0.98; b.vx *= 0.98;
        }
        // No angular velocity added — ice cubes don't spin from collisions
      }
    }
  }
}

function render() {
  ctx.clearRect(0, 0, W, H);
  for (const b of boxes) {
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(b.angle);

    // Shadow
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = dragging && dragging.id===b.id ? 28 : 14;
    ctx.shadowOffsetY = 4;
    ctx.drawImage(iconCache[b.id], -BOX/2, -BOX/2, BOX, BOX);
    ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

    // Label
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.font = `${BOX * 0.135}px -apple-system,sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(ICONS[b.id].label, 0, BOX/2 + BOX*0.2);

    ctx.restore();
  }
}

function loop() { step(); render(); requestAnimationFrame(loop); }

window.addEventListener('resize', () => { resize(); });
resize();

// ═══════════════════════════════════════════════════════════
// TRANSITION: grid → physics
// ═══════════════════════════════════════════════════════════
function activatePhysics() {
  physicsActive = true;
  // Hide grid overlay
  const overlay = document.getElementById('grid-overlay');
  overlay.classList.add('hidden');
  setTimeout(() => { overlay.style.display='none'; }, 600);

  // Show canvas and shake button
  canvas.style.display = 'block';
  document.getElementById('shakeBtn').style.display = 'flex';
  document.getElementById('footer').textContent = '倾斜手机改变重力 · 拖动图标';

  // Start physics at grid positions, then apply gravity
  initBoxesAtGrid();
  loop();

  // Give a tiny initial downward nudge so they start falling
  setTimeout(() => {
    gravity = { x: 0, y: 1 };
  }, 100);
}

// ═══════════════════════════════════════════════════════════
// INPUT (touch/mouse for physics canvas)
// ═══════════════════════════════════════════════════════════
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: src.clientX - rect.left, y: src.clientY - rect.top };
}
function findBox(px, py) {
  for (let i = boxes.length-1; i >= 0; i--) {
    const b = boxes[i];
    if (Math.abs(px-b.x) < PHYS_R && Math.abs(py-b.y) < PHYS_R) return b;
  }
  return null;
}

canvas.addEventListener('touchstart', e => { e.preventDefault(); const p=getPos(e); dragging=findBox(p.x,p.y); lastPos=p; }, {passive:false});
canvas.addEventListener('touchmove', e => { e.preventDefault(); if(!dragging)return; const p=getPos(e); dragging.vx=(p.x-lastPos.x)*.55; dragging.vy=(p.y-lastPos.y)*.55; dragging.x=p.x; dragging.y=p.y; lastPos=p; }, {passive:false});
canvas.addEventListener('touchend', e => { e.preventDefault(); if(dragging){dragging.vx*=1.4; dragging.vy*=1.4; dragging.av=0; dragging=null;} }, {passive:false});

canvas.addEventListener('mousemove', e => {
  if (!e.buttons) {
    if (!gyroOn) { const rect=canvas.getBoundingClientRect(); gravity.x=((e.clientX-rect.left)/W*2-1)*1.2; gravity.y=((e.clientY-rect.top)/H*2-1)*1.2; }
    return;
  }
  if (dragging) { const p=getPos(e); dragging.vx=(p.x-dragging.x)*.55; dragging.vy=(p.y-dragging.y)*.55; dragging.x=p.x; dragging.y=p.y; }
});
canvas.addEventListener('mousedown', e => { const p=getPos(e); dragging=findBox(p.x,p.y); });
canvas.addEventListener('mouseup', () => { if(dragging){ dragging.vx*=1.4; dragging.vy*=1.4; dragging.av=0; dragging=null; } });

document.getElementById('shakeBtn').addEventListener('click', () => {
  boxes.forEach(b => { b.vx=(Math.random()-.5)*36; b.vy=(Math.random()-.5)*36; b.av=0; });
});

// ═══════════════════════════════════════════════════════════
// GYROSCOPE
// ═══════════════════════════════════════════════════════════
const gyroBtn = document.getElementById('gyroBtn');
const gyroPrompt = document.getElementById('gyro-prompt');

function enableGyro() {
  window.addEventListener('deviceorientation', e => {
    if (!gyroOn) return;
    gravity.x =  Math.sin((e.gamma||0) * Math.PI/180) * 2;
    gravity.y =  Math.sin((e.beta||0)  * Math.PI/180) * 2;
  });
  gyroOn = true;
  gyroBtn.classList.add('on');
  gyroBtn.textContent = '🌀';

  if (!physicsActive) activatePhysics();
}

gyroBtn.addEventListener('click', async () => {
  if (gyroOn) {
    gyroOn = false; gyroBtn.classList.remove('on'); gyroBtn.textContent = '📱';
    gravity = { x: 0, y: 1 }; return;
  }
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    gyroPrompt.classList.add('show');
  } else {
    // Desktop or Android — activate directly
    enableGyro();
    // On desktop use mouse for gravity (already wired up)
    if (!('ontouchstart' in window)) activatePhysics();
  }
});

document.getElementById('gyroAllowBtn').addEventListener('click', async () => {
  gyroPrompt.classList.remove('show');
  try {
    const p = await DeviceOrientationEvent.requestPermission();
    if (p === 'granted') enableGyro();
  } catch(e) { enableGyro(); }
});
document.getElementById('gyroSkipBtn').addEventListener('click', () => gyroPrompt.classList.remove('show'));
