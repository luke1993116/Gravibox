<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GraviIcons">
<meta name="theme-color" content="#1c1c1e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>GraviIcons</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --safe-top:env(safe-area-inset-top,44px);
  --safe-bottom:env(safe-area-inset-bottom,34px);
}
html,body{
  width:100%;height:100%;background:#1c1c1e;
  overflow:hidden;font-family:-apple-system,sans-serif;
  touch-action:none;user-select:none;-webkit-user-select:none;
}
#app{position:fixed;inset:0;display:flex;flex-direction:column;}

#header{
  padding:calc(var(--safe-top)+8px) 16px 6px;
  display:flex;align-items:center;justify-content:space-between;z-index:10;flex-shrink:0;
}
#header h1{font-size:17px;font-weight:700;color:rgba(255,255,255,.88);letter-spacing:-.3px;}
.hbtns{display:flex;gap:8px;}
.hbtn{
  width:36px;height:36px;border-radius:50%;border:none;
  background:rgba(255,255,255,.12);color:rgba(255,255,255,.7);
  font-size:15px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background .15s,transform .1s;
}
.hbtn:active{background:rgba(255,255,255,.25);transform:scale(.9);}
.hbtn.on{background:rgba(80,200,120,.3);color:#66dd88;}

#canvas-wrap{flex:1;position:relative;overflow:hidden;min-height:0;}

/* THE ONLY canvas — always visible */
#c{
  position:absolute;inset:0;
  width:100%;height:100%;
  display:block;
}

#footer{
  padding:4px 16px calc(var(--safe-bottom)+4px);
  text-align:center;font-size:10px;color:rgba(255,255,255,.2);flex-shrink:0;
}

/* Gyro prompt */
#gyro-prompt{
  position:fixed;inset:0;background:rgba(0,0,0,.75);
  display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:calc(var(--safe-bottom)+24px);
  z-index:50;opacity:0;pointer-events:none;transition:opacity .3s;
}
#gyro-prompt.show{opacity:1;pointer-events:all;}
.gp-card{background:#2c2c2e;border-radius:22px;padding:30px 24px 22px;width:calc(100% - 32px);max-width:380px;text-align:center;}
.gp-icon{font-size:50px;margin-bottom:14px;}
.gp-title{font-size:21px;font-weight:700;color:#fff;margin-bottom:8px;}
.gp-desc{font-size:14px;color:rgba(255,255,255,.5);margin-bottom:24px;line-height:1.6;}
.gp-btn{width:100%;padding:15px;border-radius:14px;border:none;background:#30d158;color:#fff;font-size:17px;font-weight:600;cursor:pointer;margin-bottom:10px;}
.gp-skip{background:none;border:none;color:rgba(255,255,255,.3);font-size:14px;cursor:pointer;padding:8px;}

/* Install bar */
#install-bar{
  position:fixed;bottom:calc(var(--safe-bottom)+58px);left:50%;transform:translateX(-50%);
  background:rgba(40,40,42,.96);border:1px solid rgba(255,255,255,.1);
  border-radius:14px;padding:9px 14px;
  display:flex;align-items:center;gap:10px;z-index:20;
  max-width:calc(100% - 32px);font-size:11px;color:rgba(255,255,255,.7);
  white-space:nowrap;animation:slideUp .4s 3s both;
}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(14px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.ib-close{background:none;border:none;color:rgba(255,255,255,.3);cursor:pointer;font-size:15px;margin-left:4px;}

/* Badge */
#badge{
  position:absolute;top:8px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.5);border-radius:20px;padding:3px 14px;
  font-size:11px;color:rgba(255,255,255,.5);pointer-events:none;
  white-space:nowrap;z-index:5;transition:opacity .3s;
}
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <h1>GraviIcons</h1>
    <div class="hbtns">
      <button class="hbtn" id="gyroBtn">📱</button>
      <button class="hbtn" id="homeBtn">🏠</button>
    </div>
  </div>
  <div id="canvas-wrap">
    <canvas id="c"></canvas>
    <div id="badge">静止模式 · 点击图标弹飞</div>
  </div>
  <div id="footer">开启陀螺仪 → 倾斜掉落 · 摇两下归位</div>
</div>

<div id="gyro-prompt">
  <div class="gp-card">
    <div class="gp-icon">📱</div>
    <div class="gp-title">开启陀螺仪</div>
    <div class="gp-desc">倾斜手机让图标像积木掉落堆叠<br>摇一下甩飞 · 摇两下归位</div>
    <button class="gp-btn" id="gyroAllowBtn">✦ 开启陀螺仪</button>
    <button class="gp-skip" id="gyroSkipBtn">稍后再说</button>
  </div>
</div>

<div id="install-bar" style="display:none">
  <span>⬆️</span><span>分享 → 添加到主屏幕</span>
  <button class="ib-close" id="installClose">✕</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
// ─────────────────────────────────────────────
// ICON DRAWING
// ─────────────────────────────────────────────
const ICONS=[
  {label:'商店',  grad:['#1a8cff','#0055cc'], draw:drawStore},
  {label:'音乐',  grad:['#cc44ff','#7700cc'],  draw:drawMusic},
  {label:'相机',  grad:['#888','#444'],         draw:drawCamera},
  {label:'时钟',  grad:['#333','#111'],          draw:drawClock},
  {label:'邮件',  grad:['#55aaff','#1a66cc'],  draw:drawMail},
  {label:'消息',  grad:['#33cc44','#1a8829'],  draw:drawMsg},
  {label:'电话',  grad:['#44cc44','#228822'],  draw:drawPhone},
  {label:'导航',  grad:['#3399ff','#1155bb'],  draw:drawCompass},
  {label:'天气',  grad:['#55aaee','#2277bb'],  draw:drawWeather},
  {label:'设置',  grad:['#888','#555'],         draw:drawSettings},
  {label:'股票',  grad:['#0d2233','#1a4466'],  draw:drawStocks},
  {label:'视频',  grad:['#333','#111'],          draw:drawClapper},
  {label:'地图',  grad:['#77ccff','#bbe8ff'],  draw:drawMap},
  {label:'备忘录',grad:['#ffdd44','#ffaa00'],  draw:drawNotes},
  {label:'播客',  grad:['#aa44ff','#6600cc'],  draw:drawPodcast},
  {label:'通讯录',grad:['#cc9944','#885500'],  draw:drawContacts},
  {label:'照片',  grad:['#fff','#ddd'],         draw:drawPhotos},
  {label:'计算器',grad:['#2a2a2a','#111'],      draw:drawCalc},
  {label:'健康',  grad:['#ff3366','#cc0044'],  draw:drawHealth},
  {label:'钱包',  grad:['#1a1a1a','#000'],      draw:drawWallet},
  {label:'游戏',  grad:['#ff6633','#cc3300'],  draw:drawGame},
  {label:'雨天',  grad:['#667799','#445566'],  draw:drawRain},
  {label:'图书',  grad:['#ff8833','#cc5500'],  draw:drawBook},
  {label:'手电',  grad:['#222','#000'],          draw:drawFlash},
];

function _rc(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();c.fill();}
function _ci(c,cx,cy,r,col){c.beginPath();c.arc(cx,cy,r,0,Math.PI*2);c.fillStyle=col;c.fill();}
function _ln(c,x1,y1,x2,y2,w,col){c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.strokeStyle=col;c.lineWidth=w;c.stroke();}

function drawStore(c,s){c.strokeStyle='#fff';c.lineWidth=s*.07;c.lineCap='round';c.beginPath();c.arc(s*.5,s*.5,s*.3,0,Math.PI*2);c.stroke();c.beginPath();c.arc(s*.5,s*.5,s*.15,0,Math.PI*2);c.stroke();_ln(c,s*.5,s*.2,s*.5,s*.8,s*.07,'#fff');_ln(c,s*.2,s*.5,s*.8,s*.5,s*.07,'#fff');}
function drawMusic(c,s){c.fillStyle='#fff';c.beginPath();c.ellipse(s*.36,s*.65,s*.1,s*.08,-.4,0,Math.PI*2);c.fill();c.beginPath();c.ellipse(s*.62,s*.57,s*.1,s*.08,-.4,0,Math.PI*2);c.fill();c.fillRect(s*.44,s*.28,s*.045,s*.38);c.fillRect(s*.7,s*.22,s*.045,s*.36);c.fillRect(s*.44,s*.26,s*.3,s*.07);}
function drawCamera(c,s){c.fillStyle='#bbb';_rc(c,s*.12,s*.3,s*.76,s*.44,s*.08);c.fillStyle='#aaa';_rc(c,s*.34,s*.2,s*.2,s*.12,s*.04);_ci(c,s*.5,s*.52,s*.14,'#555');_ci(c,s*.5,s*.52,s*.1,'#333');_ci(c,s*.5,s*.52,s*.06,'#111');_ci(c,s*.43,s*.46,s*.02,'rgba(255,255,255,.5)');}
function drawClock(c,s){_ci(c,s*.5,s*.5,s*.38,'#fff');_ci(c,s*.5,s*.5,s*.34,'#f5f5f5');for(let i=0;i<12;i++){const a=i/12*Math.PI*2-Math.PI/2,r1=i%3===0?.25:.28;_ln(c,s*(.5+Math.cos(a)*r1),s*(.5+Math.sin(a)*r1),s*(.5+Math.cos(a)*.32),s*(.5+Math.sin(a)*.32),s*.03,'#444');}c.lineCap='round';_ln(c,s*.5,s*.5,s*(.5+Math.cos(Math.PI*.5)*.18),s*(.5+Math.sin(Math.PI*.5)*.18),s*.045,'#222');_ln(c,s*.5,s*.5,s*.5,s*.22,s*.04,'#222');_ln(c,s*.5,s*.58,s*.5,s*.2,s*.025,'#f20');_ci(c,s*.5,s*.5,s*.03,'#333');}
function drawMail(c,s){c.fillStyle='#fff';_rc(c,s*.12,s*.3,s*.76,s*.44,s*.06);c.strokeStyle='#5599ee';c.lineWidth=s*.04;c.lineJoin='round';c.beginPath();c.moveTo(s*.14,s*.32);c.lineTo(s*.5,s*.56);c.lineTo(s*.86,s*.32);c.stroke();}
function drawMsg(c,s){c.fillStyle='#fff';c.beginPath();c.moveTo(s*.2,s*.24);c.lineTo(s*.8,s*.24);c.quadraticCurveTo(s*.88,s*.24,s*.88,s*.4);c.lineTo(s*.88,s*.62);c.quadraticCurveTo(s*.88,s*.72,s*.78,s*.72);c.lineTo(s*.42,s*.72);c.lineTo(s*.28,s*.86);c.lineTo(s*.3,s*.72);c.lineTo(s*.22,s*.72);c.quadraticCurveTo(s*.12,s*.72,s*.12,s*.62);c.lineTo(s*.12,s*.4);c.quadraticCurveTo(s*.12,s*.24,s*.2,s*.24);c.closePath();c.fill();}
function drawPhone(c,s){c.fillStyle='#fff';c.save();c.translate(s*.5,s*.5);c.rotate(.22*Math.PI);c.beginPath();c.ellipse(-s*.14,-s*.22,s*.1,s*.17,0,0,Math.PI*2);c.fill();c.beginPath();c.ellipse(s*.14,s*.22,s*.1,s*.17,0,0,Math.PI*2);c.fill();c.fillRect(-s*.08,-s*.07,s*.16,s*.14);c.restore();}
function drawCompass(c,s){_ci(c,s*.5,s*.5,s*.36,'rgba(100,180,255,.2)');c.strokeStyle='rgba(255,255,255,.5)';c.lineWidth=s*.04;c.beginPath();c.arc(s*.5,s*.5,s*.34,0,Math.PI*2);c.stroke();c.fillStyle='rgba(255,255,255,.5)';c.font=`bold ${s*.11}px sans-serif`;c.textAlign='center';c.fillText('N',s*.5,s*.22);c.fillText('S',s*.5,s*.86);c.fillText('E',s*.83,s*.55);c.fillText('W',s*.17,s*.55);c.save();c.translate(s*.5,s*.5);c.rotate(.6);c.fillStyle='#f42';c.beginPath();c.moveTo(0,-s*.24);c.lineTo(s*.05,0);c.lineTo(0,s*.06);c.lineTo(-s*.05,0);c.closePath();c.fill();c.fillStyle='#ddd';c.beginPath();c.moveTo(0,s*.06);c.lineTo(s*.05,0);c.lineTo(0,s*.24);c.lineTo(-s*.05,0);c.closePath();c.fill();c.restore();_ci(c,s*.5,s*.5,s*.04,'#fff');}
function drawWeather(c,s){for(let i=0;i<8;i++){const a=i/8*Math.PI*2;_ln(c,s*(.44+Math.cos(a)*.22),s*(.46+Math.sin(a)*.22),s*(.44+Math.cos(a)*.3),s*(.46+Math.sin(a)*.3),s*.04,'#fc0');}_ci(c,s*.44,s*.46,s*.16,'#fd0');_ci(c,s*.44,s*.46,s*.11,'#fe4');c.fillStyle='#fff';c.font=`bold ${s*.16}px sans-serif`;c.textAlign='left';c.fillText('23°',s*.08,s*.86);}
function drawSettings(c,s){const t=8;c.fillStyle='#ccc';c.beginPath();for(let i=0;i<t;i++){const a1=i/t*Math.PI*2,a2=(i+.38)/t*Math.PI*2,a3=(i+.62)/t*Math.PI*2,a4=(i+1)/t*Math.PI*2;if(i===0)c.moveTo(s*(.5+Math.cos(a1)*.22),s*(.5+Math.sin(a1)*.22));c.lineTo(s*(.5+Math.cos(a1)*.33),s*(.5+Math.sin(a1)*.33));c.arc(s*.5,s*.5,s*.33,a1,a2);c.lineTo(s*(.5+Math.cos(a3)*.22),s*(.5+Math.sin(a3)*.22));c.arc(s*.5,s*.5,s*.22,a3,a4);}c.closePath();c.fill();_ci(c,s*.5,s*.5,s*.12,'#666');}
function drawStocks(c,s){const pts=[[.08,.72],[.22,.54],[.36,.62],[.5,.36],[.62,.48],[.75,.26],[.9,.34]];c.strokeStyle='#0cf';c.lineWidth=s*.038;c.lineJoin='round';c.lineCap='round';c.beginPath();pts.forEach(([x,y],i)=>i?c.lineTo(s*x,s*y):c.moveTo(s*x,s*y));c.stroke();c.lineTo(s*.9,s*.88);c.lineTo(s*.08,s*.88);c.closePath();c.fillStyle='rgba(0,200,255,.12)';c.fill();}
function drawClapper(c,s){c.fillStyle='#ddd';_rc(c,s*.1,s*.3,s*.8,s*.46,s*.06);c.fillStyle='#222';_rc(c,s*.1,s*.18,s*.8,s*.16,s*.05);c.fillStyle='#ddd';for(let i=0;i<4;i++){c.save();c.translate(s*(.2+i*.2),s*.19);c.rotate(-.32);c.fillRect(-s*.04,-s*.09,s*.08,s*.16);c.restore();}}
function drawMap(c,s){c.strokeStyle='rgba(255,255,255,.8)';c.lineWidth=s*.06;c.lineJoin='round';c.beginPath();c.moveTo(s*.18,s*.1);c.lineTo(s*.5,s*.55);c.lineTo(s*.82,s*.1);c.stroke();c.beginPath();c.moveTo(s*.08,s*.9);c.lineTo(s*.5,s*.55);c.lineTo(s*.92,s*.9);c.stroke();_ci(c,s*.5,s*.36,s*.14,'#f33');_ci(c,s*.5,s*.36,s*.07,'rgba(255,255,255,.9)');c.fillStyle='#f33';c.beginPath();c.moveTo(s*.41,s*.44);c.lineTo(s*.59,s*.44);c.lineTo(s*.5,s*.6);c.closePath();c.fill();}
function drawNotes(c,s){c.fillStyle='#fffde0';_rc(c,s*.14,s*.1,s*.72,s*.82,s*.05);[.34,.46,.58,.7,.8].forEach(y=>{_ln(c,s*.26,s*y,s*.8,s*y,s*.022,'rgba(200,160,0,.35)');});_ln(c,s*.28,s*.12,s*.28,s*.9,s*.022,'rgba(255,80,80,.45)');c.fillStyle='#8b5e3c';c.fillRect(s*.13,s*.1,s*.055,s*.82);}
function drawPodcast(c,s){_ci(c,s*.5,s*.4,s*.2,'rgba(255,255,255,.9)');c.strokeStyle='rgba(255,255,255,.55)';c.lineWidth=s*.04;c.lineCap='round';[[.3,-.85,-.15],[.4,-.82,-.18],[.5,-.78,-.22]].forEach(([r,a1,a2])=>{c.beginPath();c.arc(s*.5,s*.4,s*r,Math.PI*a1,Math.PI*a2);c.stroke();c.beginPath();c.arc(s*.5,s*.4,s*r,Math.PI*(1-a2),Math.PI*(1-a1));c.stroke();});_ln(c,s*.5,s*.6,s*.5,s*.78,s*.04,'rgba(255,255,255,.8)');_ln(c,s*.34,s*.78,s*.66,s*.78,s*.04,'rgba(255,255,255,.8)');}
function drawContacts(c,s){c.fillStyle='#fff';_ci(c,s*.44,s*.34,s*.15,'#fff');c.beginPath();c.arc(s*.44,s*.82,s*.26,-Math.PI,0);c.fill();['A','B','C','D','E'].forEach((l,i)=>{c.fillStyle='rgba(200,140,60,.7)';c.fillRect(s*.8,s*(.2+i*.13),s*.09,s*.1);c.fillStyle='#fff';c.font=`${s*.07}px sans-serif`;c.textAlign='center';c.fillText(l,s*.845,s*(.285+i*.13));});}
function drawPhotos(c,s){[['#f69',0],['#f93',.52],['#fe0',1.05],['#6c3',1.57],['#39f',2.1],['#a4f',2.62],['#f36',3.14],['#f60',3.67]].forEach(([col,a])=>{c.fillStyle=col;c.beginPath();c.ellipse(s*(.5+Math.cos(a)*.2),s*(.5+Math.sin(a)*.2),s*.12,s*.19,a,0,Math.PI*2);c.fill();});_ci(c,s*.5,s*.5,s*.12,'#fe4');}
function drawCalc(c,s){c.fillStyle='#444';_rc(c,s*.15,s*.12,s*.7,s*.78,s*.08);c.fillStyle='#1a1a1a';_rc(c,s*.22,s*.18,s*.56,s*.2,s*.04);c.fillStyle='#afa';c.font=`${s*.15}px monospace`;c.textAlign='right';c.fillText('42',s*.74,s*.34);[['#f90','+'],[null,'−'],[null,'×'],[null,'÷'],['#888','7'],['#888','8'],['#888','9'],['#888','4'],['#888','5'],['#888','6'],['#888','1'],['#888','2'],['#888','3']].forEach(([bg,label],idx)=>{const col=idx%4,row=Math.floor(idx/4),x=s*.2+col*(s*.15+s*.035),y=s*.43+row*(s*.1+s*.035);c.fillStyle=bg||'#777';_rc(c,x,y,s*.15,s*.1,s*.025);c.fillStyle='#fff';c.font=`${s*.09}px sans-serif`;c.textAlign='center';c.fillText(label,x+s*.075,y+s*.072);});}
function drawHealth(c,s){c.fillStyle='#fff';c.beginPath();c.moveTo(s*.5,s*.72);c.bezierCurveTo(s*.1,s*.48,s*.1,s*.22,s*.5,s*.38);c.bezierCurveTo(s*.9,s*.22,s*.9,s*.48,s*.5,s*.72);c.fill();c.strokeStyle='rgba(255,80,100,.7)';c.lineWidth=s*.04;c.lineJoin='round';c.lineCap='round';c.beginPath();c.moveTo(s*.24,s*.48);c.lineTo(s*.36,s*.48);c.lineTo(s*.42,s*.36);c.lineTo(s*.5,s*.58);c.lineTo(s*.58,s*.4);c.lineTo(s*.64,s*.48);c.lineTo(s*.76,s*.48);c.stroke();}
function drawWallet(c,s){c.fillStyle='#666';_rc(c,s*.1,s*.28,s*.8,s*.5,s*.08);c.fillStyle='#555';_rc(c,s*.1,s*.22,s*.8,s*.12,s*.04);c.fillStyle='#777';_rc(c,s*.56,s*.38,s*.3,s*.24,s*.06);_ci(c,s*.71,s*.5,s*.08,'#999');_ci(c,s*.71,s*.5,s*.04,'#666');c.fillStyle='#fc4';_rc(c,s*.16,s*.36,s*.3,s*.16,s*.04);c.fillStyle='#4af';_rc(c,s*.16,s*.54,s*.3,s*.16,s*.04);}
function drawGame(c,s){c.fillStyle='rgba(255,255,255,.88)';c.beginPath();c.ellipse(s*.5,s*.52,s*.38,s*.26,0,0,Math.PI*2);c.fill();_ci(c,s*.7,s*.42,s*.07,'#f42');_ci(c,s*.78,s*.52,s*.07,'#38f');_ci(c,s*.62,s*.52,s*.07,'#3c4');_ci(c,s*.7,s*.62,s*.07,'#fc0');c.fillStyle='#bbb';c.fillRect(s*.28,s*.49,s*.12,s*.04);c.fillRect(s*.32,s*.45,s*.04,s*.12);}
function drawRain(c,s){c.fillStyle='rgba(255,255,255,.82)';c.beginPath();c.arc(s*.36,s*.44,s*.16,0,Math.PI*2);c.fill();c.beginPath();c.arc(s*.52,s*.37,s*.2,0,Math.PI*2);c.fill();c.beginPath();c.arc(s*.68,s*.44,s*.14,0,Math.PI*2);c.fill();c.fillRect(s*.2,s*.44,s*.62,s*.14);[[.3,.64,.24,.77],[.42,.66,.36,.79],[.55,.64,.49,.77],[.67,.66,.61,.79]].forEach(([x1,y1,x2,y2])=>{_ln(c,s*x1,s*y1,s*x2,s*y2,s*.035,'rgba(120,180,255,.8)');});}
function drawBook(c,s){c.fillStyle='#fff';_rc(c,s*.2,s*.12,s*.6,s*.76,s*.05);c.fillStyle='rgba(255,120,0,.2)';c.fillRect(s*.2,s*.12,s*.055,s*.76);[.3,.4,.5,.6,.7,.78].forEach(y=>{_ln(c,s*.3,s*y,s*.74,s*y,s*.022,'rgba(0,0,0,.18)');});}
function drawFlash(c,s){c.fillStyle='#777';_rc(c,s*.38,s*.14,s*.24,s*.58,s*.09);c.fillStyle='#fe9';c.beginPath();c.moveTo(s*.33,s*.7);c.lineTo(s*.67,s*.7);c.lineTo(s*.8,s*.9);c.lineTo(s*.2,s*.9);c.closePath();c.fill();_ci(c,s*.5,s*.8,s*.07,'#ffb');_ci(c,s*.5,s*.26,s*.07,'#999');_ci(c,s*.5,s*.26,s*.04,'#bbb');}

// ─────────────────────────────────────────────
// PRE-RENDER to offscreen canvases
// ─────────────────────────────────────────────
const IR = 180; // icon render resolution
const iconCache = ICONS.map(icon => {
  const oc = document.createElement('canvas');
  oc.width = oc.height = IR;
  const c2 = oc.getContext('2d');
  const S=IR, r=S*.22;
  c2.beginPath();c2.moveTo(r,0);c2.lineTo(S-r,0);c2.quadraticCurveTo(S,0,S,r);c2.lineTo(S,S-r);c2.quadraticCurveTo(S,S,S-r,S);c2.lineTo(r,S);c2.quadraticCurveTo(0,S,0,S-r);c2.lineTo(0,r);c2.quadraticCurveTo(0,0,r,0);c2.closePath();
  const g=c2.createLinearGradient(0,0,0,S);g.addColorStop(0,icon.grad[0]);g.addColorStop(1,icon.grad[1]);c2.fillStyle=g;c2.fill();
  c2.save();c2.clip();
  const sh=c2.createLinearGradient(0,0,0,S*.5);sh.addColorStop(0,'rgba(255,255,255,.38)');sh.addColorStop(1,'rgba(255,255,255,0)');c2.fillStyle=sh;c2.fillRect(0,0,S,S*.5);
  icon.draw(c2,S);c2.restore();
  return oc;
});

// ─────────────────────────────────────────────
// LAYOUT  (iPhone grid spec)
// ─────────────────────────────────────────────
const COLS=4;
function layout(cw){
  const sc=Math.min(cw/390,1.3);
  return {
    ic:  Math.round(60*sc),
    hg:  Math.round(18*sc),
    vg:  Math.round(23*sc),
    lh:  Math.round(18*sc),
    top: Math.round(62*sc),
    sc
  };
}
function homePos(cw,ch){
  const L=layout(cw);
  const tw=COLS*L.ic+(COLS-1)*L.hg;
  const sx=(cw-tw)/2+L.ic/2;
  const sy=L.top+L.ic/2;
  return ICONS.map((_,i)=>({
    x: sx+(i%COLS)*(L.ic+L.hg),
    y: sy+Math.floor(i/COLS)*(L.ic+L.lh+L.vg)
  }));
}

// ─────────────────────────────────────────────
// MATTER.JS
// ─────────────────────────────────────────────
const {Engine,Runner,Bodies,Body,World,Events,Mouse,MouseConstraint,Composite}=Matter;

let engine, mRunner, iconBodies=[], walls=[];
let W, H;
let gyroOn=false, gyroListenerAdded=false;
let mode='grid'; // 'grid' | 'physics' | 'homing'

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const wrap=document.getElementById('canvas-wrap');

// ─── Canvas sizing ───────────────────────────
function sizeCanvas(){
  const r=wrap.getBoundingClientRect();
  W=r.width; H=r.height;
  canvas.width=Math.round(W*devicePixelRatio);
  canvas.height=Math.round(H*devicePixelRatio);
  canvas.style.width=W+'px';
  canvas.style.height=H+'px';
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
}

// ─── Draw one icon ───────────────────────────
function drawIcon(idx, x, y, size, angle, alpha){
  ctx.save();
  ctx.globalAlpha = alpha ?? 1;
  ctx.translate(x,y);
  ctx.rotate(angle??0);
  ctx.shadowColor='rgba(0,0,0,.6)';
  ctx.shadowBlur=14;
  ctx.shadowOffsetY=4;
  ctx.drawImage(iconCache[idx],-size/2,-size/2,size,size);
  ctx.shadowBlur=0;ctx.shadowOffsetY=0;
  // Upright label (rotate back)
  ctx.rotate(-(angle??0));
  ctx.fillStyle='rgba(255,255,255,.88)';
  ctx.font=`${Math.round(size*.145)}px -apple-system,sans-serif`;
  ctx.textAlign='center';
  ctx.fillText(ICONS[idx].label,0,size/2+size*.22);
  ctx.globalAlpha=1;
  ctx.restore();
}

// ─── RENDER LOOP ─────────────────────────────
let rafId=null;
function startRender(){
  if(rafId) return;
  (function loop(){
    rafId=requestAnimationFrame(loop);
    ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
    ctx.clearRect(0,0,W,H);

    if(mode==='grid'){
      // Draw icons at static home positions
      const homes=homePos(W,H);
      const L=layout(W);
      homes.forEach((h,i)=>drawIcon(i,h.x,h.y,L.ic,0,1));

    } else if(mode==='physics' || mode==='homing'){
      // Draw from Matter.js body positions
      const L=layout(W);
      iconBodies.forEach(b=>{
        drawIcon(b.iconIdx,b.position.x,b.position.y,L.ic,b.angle,1);
      });
    }
  })();
}

// ─── BUILD WALLS ─────────────────────────────
function buildWalls(){
  walls.forEach(w=>World.remove(engine.world,w));
  const T=80;
  walls=[
    Bodies.rectangle(W/2, H+T/2,  W+T*2, T, {isStatic:true,friction:.6,restitution:.3}),
    Bodies.rectangle(W/2, -T/2,   W+T*2, T, {isStatic:true,friction:.6,restitution:.1}),
    Bodies.rectangle(-T/2,  H/2,  T, H+T*2, {isStatic:true,friction:.6,restitution:.3}),
    Bodies.rectangle(W+T/2, H/2,  T, H+T*2, {isStatic:true,friction:.6,restitution:.3}),
  ];
  World.add(engine.world,walls);
}

// ─── INIT PHYSICS ────────────────────────────
function initPhysics(){
  if(engine){
    // Already exists — just rebuild walls for new size
    buildWalls(); return;
  }
  engine=Engine.create({gravity:{x:0,y:1,scale:0.0018}});
  mRunner=Runner.create();
  Runner.run(mRunner,engine);
  buildWalls();

  // Place icon bodies at home positions
  const homes=homePos(W,H);
  const L=layout(W);
  iconBodies=ICONS.map((_,i)=>{
    const b=Bodies.rectangle(homes[i].x,homes[i].y,L.ic,L.ic,{
      restitution:.45,
      friction:.55,
      frictionAir:.018,
      density:.002,
      // Start completely static — gravity will move them once we set it
    });
    b.iconIdx=i;
    return b;
  });
  World.add(engine.world,iconBodies);

  // Touch drag
  const mouse=Mouse.create(canvas);
  mouse.pixelRatio=devicePixelRatio;
  const mc=MouseConstraint.create(engine,{
    mouse,
    constraint:{stiffness:.3,render:{visible:false}}
  });
  World.add(engine.world,mc);
  // Prevent scroll
  canvas.addEventListener('wheel',e=>e.preventDefault(),{passive:false});
}

// ─── SWITCH TO PHYSICS MODE ──────────────────
// Icons are already at home positions in the physics world.
// Just switch gravity on and set mode.
function goPhysics(){
  if(!engine) initPhysics();
  // Reset all bodies to home, zero velocity
  const homes=homePos(W,H);
  iconBodies.forEach((b,i)=>{
    Body.setPosition(b,{x:homes[i].x,y:homes[i].y});
    Body.setVelocity(b,{x:0,y:0});
    Body.setAngle(b,0);
    Body.setAngularVelocity(b,0);
  });
  mode='physics';
  // Gravity pulls them down immediately
  engine.gravity.x=0;
  engine.gravity.y=1;
  setBadge('重力模式 · 倾斜手机','rgba(255,255,255,.5)');
}

// ─── HOME (spring back) ──────────────────────
let homingUnsub=null;
function goHome(){
  if(mode==='homing') return;
  mode='homing';
  engine.gravity.x=0; engine.gravity.y=0;
  const targets=homePos(W,H);
  setBadge('🏠 归位中…','rgba(255,210,60,.9)');

  if(homingUnsub) Events.off(engine,'beforeUpdate',homingUnsub);
  homingUnsub=()=>{
    let done=true;
    iconBodies.forEach((b,i)=>{
      const dx=targets[i].x-b.position.x;
      const dy=targets[i].y-b.position.y;
      // Spring
      Body.applyForce(b,b.position,{x:dx*.009,y:dy*.009});
      // Damp velocity
      Body.setVelocity(b,{x:b.velocity.x*.82,y:b.velocity.y*.82});
      Body.setAngularVelocity(b,b.angularVelocity*.75);
      Body.setAngle(b,b.angle*.88);
      if(Math.sqrt(dx*dx+dy*dy)>2||Math.abs(b.velocity.x)+Math.abs(b.velocity.y)>.3) done=false;
    });
    if(done){
      Events.off(engine,'beforeUpdate',homingUnsub);
      iconBodies.forEach((b,i)=>{
        Body.setPosition(b,{x:targets[i].x,y:targets[i].y});
        Body.setVelocity(b,{x:0,y:0});
        Body.setAngle(b,0);
        Body.setAngularVelocity(b,0);
      });
      mode='physics';
      // Restore gravity after homing
      engine.gravity.x=0;
      engine.gravity.y= gyroOn ? 0 : 1;
      setBadge(gyroOn?'🌀 陀螺仪':'重力模式','rgba(255,255,255,.5)');
    }
  };
  Events.on(engine,'beforeUpdate',homingUnsub);
}

// ─── SHAKE ALL ───────────────────────────────
function shakeAll(){
  if(!engine) return;
  iconBodies.forEach(b=>{
    Body.applyForce(b,b.position,{
      x:(Math.random()-.5)*.12,
      y:(Math.random()-.5)*.12-.05
    });
    Body.setAngularVelocity(b,(Math.random()-.5)*.8);
  });
}

// ─── GYROSCOPE ───────────────────────────────
function enableGyro(){
  if(!gyroListenerAdded){
    gyroListenerAdded=true;
    window.addEventListener('deviceorientation',e=>{
      if(!gyroOn||mode==='homing') return;
      engine.gravity.x=Math.sin((e.gamma||0)*Math.PI/180);
      engine.gravity.y=Math.sin((e.beta||0) *Math.PI/180);
    });
  }
  gyroOn=true;
  document.getElementById('gyroBtn').classList.add('on');
  document.getElementById('gyroBtn').textContent='🌀';
  if(mode==='physics') setBadge('🌀 陀螺仪','rgba(100,220,100,.85)');
}
function disableGyro(){
  gyroOn=false;
  document.getElementById('gyroBtn').classList.remove('on');
  document.getElementById('gyroBtn').textContent='📱';
  if(engine&&mode==='physics'){engine.gravity.x=0;engine.gravity.y=1;}
  if(mode==='physics') setBadge('重力模式','rgba(255,255,255,.5)');
}

// Gyro button
const gyroBtn=document.getElementById('gyroBtn');
const gyroPrompt=document.getElementById('gyro-prompt');
gyroBtn.addEventListener('click',async()=>{
  if(gyroOn){disableGyro();return;}
  if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
    gyroPrompt.classList.add('show');
  } else {
    enableGyro();
  }
});
document.getElementById('gyroAllowBtn').addEventListener('click',async()=>{
  gyroPrompt.classList.remove('show');
  try{const p=await DeviceOrientationEvent.requestPermission();if(p==='granted')enableGyro();}
  catch(e){enableGyro();}
});
document.getElementById('gyroSkipBtn').addEventListener('click',()=>gyroPrompt.classList.remove('show'));

// Home button — switches to physics if in grid mode, else homes
document.getElementById('homeBtn').addEventListener('click',()=>{
  if(mode==='grid'){
    goPhysics();
  } else {
    goHome();
  }
});

// Desktop mouse gravity
canvas.addEventListener('mousemove',e=>{
  if(!engine||!gyroOn||mode==='homing') return;
  // On desktop without gyro, mouse position drives gravity
});

// ─── SHAKE DETECTION ─────────────────────────
let lastAccel={x:0,y:0,z:0},shakeCnt=0,lastShakeT=0;
window.addEventListener('devicemotion',e=>{
  const a=e.accelerationIncludingGravity; if(!a) return;
  const dx=a.x-lastAccel.x,dy=a.y-lastAccel.y,dz=a.z-lastAccel.z;
  const mag=Math.sqrt(dx*dx+dy*dy+dz*dz);
  lastAccel={x:a.x,y:a.y,z:a.z};
  const now=Date.now();
  if(mag>18&&now-lastShakeT>280){
    lastShakeT=now; shakeCnt++;
    if(shakeCnt>=2&&mode!=='grid'&&mode!=='homing'){
      shakeCnt=0; goHome();
      setTimeout(disableGyro,300);
    } else if(shakeCnt===1&&mode==='physics'){
      shakeAll();
      if(!gyroOn) enableGyro();
    }
    setTimeout(()=>{shakeCnt=Math.max(0,shakeCnt-1);},700);
  }
});

// ─── BADGE ───────────────────────────────────
function setBadge(t,c){
  const b=document.getElementById('badge');
  b.textContent=t; b.style.color=c;
}

// ─── RESIZE ──────────────────────────────────
window.addEventListener('resize',()=>{
  sizeCanvas();
  if(engine) buildWalls();
});

// ─── START ───────────────────────────────────
sizeCanvas();
startRender();   // Immediately draws grid (no physics yet)
// Pre-init physics engine in background so first tap is instant
setTimeout(()=>initPhysics(), 400);

// PWA
if(/iphone|ipad|ipod/i.test(navigator.userAgent)&&!window.navigator.standalone){
  document.getElementById('install-bar').style.display='flex';
  document.getElementById('installClose').addEventListener('click',e=>e.target.closest('#install-bar').style.display='none');
}
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
