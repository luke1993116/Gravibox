<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GraviIcons">
<meta name="theme-color" content="#1c1c1e">
<link rel="manifest" href="manifest.json">

<title>GraviIcons</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --safe-top:env(safe-area-inset-top,44px);
  --safe-bottom:env(safe-area-inset-bottom,34px);
}
html,body{
  width:100%;height:100%;
  background: linear-gradient(160deg, #2c4a6e 0%, #1a3a5c 25%, #0f2847 50%, #1a2f4a 75%, #0d1f33 100%);
  overflow:hidden;font-family:-apple-system,sans-serif;
  touch-action:none;user-select:none;-webkit-user-select:none;
}
#app{position:fixed;inset:0;display:flex;flex-direction:column;}

#header{
  padding:calc(max(var(--safe-top), 44px) + 4px) 20px 8px;
  display:flex;align-items:center;justify-content:space-between;z-index:10;flex-shrink:0;
  background:transparent;
  position:relative;
}
#header h1{font-size:17px;font-weight:700;color:rgba(255,255,255,.88);letter-spacing:-.3px;}
.hbtns{display:flex;gap:8px;}
.hbtn{
  width:36px;height:36px;border-radius:50%;border:none;
  background:rgba(255,255,255,.12);color:rgba(255,255,255,.7);
  font-size:15px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background .15s,transform .1s;
}
.hbtn:active{background:rgba(255,255,255,.25);transform:scale(.9);}
.hbtn.on{background:rgba(80,200,120,.3);color:#66dd88;}

#canvas-wrap{flex:1;position:relative;overflow:hidden;min-height:0;}

/* THE ONLY canvas вҖ” always visible */
#c{
  position:absolute;inset:0;
  width:100%;height:100%;
  display:block;
}

#footer{
  padding:4px 16px calc(var(--safe-bottom)+4px);
  text-align:center;font-size:10px;color:rgba(255,255,255,.25);flex-shrink:0;
  background:transparent;
}

/* Gyro prompt */
#gyro-prompt{
  position:fixed;inset:0;background:rgba(0,0,0,.75);
  display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:calc(var(--safe-bottom)+24px);
  z-index:50;opacity:0;pointer-events:none;transition:opacity .3s;
}
#gyro-prompt.show{opacity:1;pointer-events:all;}
.gp-card{background:#2c2c2e;border-radius:22px;padding:30px 24px 22px;width:calc(100% - 32px);max-width:380px;text-align:center;}
.gp-icon{font-size:50px;margin-bottom:14px;}
.gp-title{font-size:21px;font-weight:700;color:#fff;margin-bottom:8px;}
.gp-desc{font-size:14px;color:rgba(255,255,255,.5);margin-bottom:24px;line-height:1.6;}
.gp-btn{width:100%;padding:15px;border-radius:14px;border:none;background:#30d158;color:#fff;font-size:17px;font-weight:600;cursor:pointer;margin-bottom:10px;}
.gp-skip{background:none;border:none;color:rgba(255,255,255,.3);font-size:14px;cursor:pointer;padding:8px;}

/* Install bar */
#install-bar{
  position:fixed;bottom:calc(var(--safe-bottom)+58px);left:50%;transform:translateX(-50%);
  background:rgba(40,40,42,.96);border:1px solid rgba(255,255,255,.1);
  border-radius:14px;padding:9px 14px;
  display:flex;align-items:center;gap:10px;z-index:20;
  max-width:calc(100% - 32px);font-size:11px;color:rgba(255,255,255,.7);
  white-space:nowrap;animation:slideUp .4s 3s both;
}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(14px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.ib-close{background:none;border:none;color:rgba(255,255,255,.3);cursor:pointer;font-size:15px;margin-left:4px;}

/* Badge */
#badge{
  position:absolute;bottom:calc(var(--safe-bottom)+10px);left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.35);border-radius:20px;padding:4px 16px;
  font-size:11px;color:rgba(255,255,255,.6);pointer-events:none;
  white-space:nowrap;z-index:5;transition:opacity .3s;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
</style>
</head>

<div id="app">
  <div id="header">
    <h1></h1>
    <div class="hbtns">
      <button class="hbtn" id="gyroBtn">рҹ“ұ</button>
      <button class="hbtn" id="homeBtn">рҹҸ </button>
    </div>
  </div>
  <div id="canvas-wrap">
    <canvas id="c"></canvas>
    <div id="badge">йқҷжӯўжЁЎејҸ В· зӮ№еҮ»еӣҫж Үеј№йЈһ</div>
  </div>
  <div id="footer">ејҖеҗҜйҷҖиһәд»Ә вҶ’ еҖҫж–ңжҺүиҗҪ В· ж‘ҮдёӨдёӢеҪ’дҪҚ</div>
</div>

    <button class="gp-skip" id="gyroSkipBtn">зЁҚеҗҺеҶҚиҜҙ</button>
  </div>
</div>

<div id="install-bar" style="display:none">

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// LAYOUT  (iPhone grid spec)
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const COLS=4;
function layout(cw, ch){
  const sc = Math.min(cw / 390, 1.3);
  const ic  = Math.round(60 * sc);
  const hg  = Math.round(18 * sc);
  const vg  = Math.round(14 * sc);
  const lh  = Math.round(20 * sc);
  const top = Math.round(100 * sc);
  // Leave space for dock at bottom
  const dockReserve = Math.round((62 + 14*2 + 4 + 34 + 10) * sc);
  return { ic, hg, vg, lh, top, sc, dockReserve };
}
function homePos(cw, ch){
  const L = layout(cw, ch);
  const totalW = COLS * L.ic + (COLS-1) * L.hg;
  const sx = (cw - totalW) / 2 + L.ic / 2;
  const sy = L.top + L.ic / 2;
  const cellH = L.ic + L.lh + L.vg;
  return ICONS.map((_,i) => ({
    x: sx + (i % COLS) * (L.ic + L.hg),
    y: sy + Math.floor(i / COLS) * cellH
  }));
}

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

const canvas=document.getElementById('c');

// в”Җв”Җв”Җ Canvas sizing в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function sizeCanvas(){
  const r=wrap.getBoundingClientRect();
  W=r.width; H=r.height;
  canvas.width=Math.round(W*devicePixelRatio);
  canvas.height=Math.round(H*devicePixelRatio);
  canvas.style.width=W+'px';
  canvas.style.height=H+'px';
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
}

// в”Җв”Җв”Җ Wallpaper + Dock в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let wallpaperCache = null;

function buildWallpaper() {
  const oc = document.createElement('canvas');
  const pw = Math.round(W * devicePixelRatio);
  const ph = Math.round(H * devicePixelRatio);
  oc.width = pw; oc.height = ph;
  const c2 = oc.getContext('2d');

  // в”Җв”Җ Base gradient: deep blue-purple в”Җв”Җ
  const bg = c2.createLinearGradient(pw * 0.3, 0, pw * 0.7, ph);
  bg.addColorStop(0,   '#1a2a4a');
  bg.addColorStop(0.4, '#0e1f3a');
  bg.addColorStop(0.8, '#0a1830');
  bg.addColorStop(1,   '#060f22');
  c2.fillStyle = bg;
  c2.fillRect(0, 0, pw, ph);

  // в”Җв”Җ Large blurred light orbs (bokeh base) в”Җв”Җ
  const orbs = [
    [0.20, 0.18, 0.38, 'rgba(60,120,220,0.22)'],
    [0.75, 0.12, 0.32, 'rgba(80,100,200,0.18)'],
    [0.85, 0.60, 0.30, 'rgba(40,80,180,0.16)'],
    [0.10, 0.72, 0.35, 'rgba(50,100,200,0.18)'],
    [0.50, 0.45, 0.40, 'rgba(30,70,160,0.14)'],
    [0.65, 0.85, 0.28, 'rgba(60,110,210,0.15)'],
  ];
  orbs.forEach(([cx,cy,r,col]) => {
    const g2 = c2.createRadialGradient(pw*cx,ph*cy,0, pw*cx,ph*cy, Math.min(pw,ph)*r);
    g2.addColorStop(0, col); g2.addColorStop(1,'rgba(0,0,0,0)');
    c2.fillStyle = g2; c2.fillRect(0,0,pw,ph);
  });

  // в”Җв”Җ Water-droplet / glass texture в”Җв”Җ
  // Simulate wet glass with small elliptical refraction patches
  const drops = [
    [0.12,0.22,18,28],[0.38,0.15,22,32],[0.68,0.28,16,24],
    [0.82,0.18,20,30],[0.25,0.52,24,36],[0.55,0.42,18,26],
    [0.78,0.55,22,34],[0.08,0.68,16,22],[0.45,0.78,20,30],
    [0.88,0.72,18,28],[0.30,0.88,24,34],[0.62,0.92,16,24],
    [0.15,0.38,20,28],[0.72,0.38,18,26],[0.50,0.62,22,32],
    [0.92,0.42,16,24],[0.35,0.65,20,28],[0.18,0.82,18,26],
  ];
  drops.forEach(([cx,cy,rw,rh]) => {
    const x=pw*cx, y=ph*cy;
    const sc2=Math.min(pw,ph)/390;
    const drw=rw*sc2, drh=rh*sc2;
    c2.save();
    c2.beginPath();
    c2.ellipse(x, y, drw, drh, Math.random()*Math.PI, 0, Math.PI*2);
    c2.clip();
    // Inner refraction: slightly lighter top, darker bottom
    const dg = c2.createLinearGradient(x,y-drh, x,y+drh);
    dg.addColorStop(0,   'rgba(180,220,255,0.13)');
    dg.addColorStop(0.4, 'rgba(100,160,230,0.08)');
    dg.addColorStop(0.7, 'rgba(20,50,120,0.10)');
    dg.addColorStop(1,   'rgba(10,30,80,0.15)');
    c2.fillStyle = dg; c2.fillRect(x-drw,y-drh,drw*2,drh*2);
    // Specular highlight at top of drop
    const sg = c2.createRadialGradient(x-drw*0.2, y-drh*0.5, 0, x-drw*0.2, y-drh*0.5, drw*0.7);
    sg.addColorStop(0,   'rgba(255,255,255,0.28)');
    sg.addColorStop(0.5, 'rgba(200,230,255,0.08)');
    sg.addColorStop(1,   'rgba(0,0,0,0)');
    c2.fillStyle = sg; c2.fillRect(x-drw,y-drh,drw*2,drh*2);
    // Thin rim
    c2.strokeStyle='rgba(160,200,255,0.18)'; c2.lineWidth=0.8*sc2;
    c2.stroke();
    c2.restore();
  });

  // в”Җв”Җ Fine noise grain overlay for glass feel в”Җв”Җ
  // Use a small repeated pattern
  const noiseOc = document.createElement('canvas');
  noiseOc.width=64; noiseOc.height=64;
  const nc = noiseOc.getContext('2d');
  const nid = nc.createImageData(64,64);
  for(let i=0;i<nid.data.length;i+=4){
    const v=Math.random()*20|0;
    nid.data[i]=nid.data[i+1]=nid.data[i+2]=v;
    nid.data[i+3]=18;
  }
  nc.putImageData(nid,0,0);
  const pat = c2.createPattern(noiseOc,'repeat');
  c2.fillStyle=pat; c2.fillRect(0,0,pw,ph);

  return oc;
}

function drawWallpaper() {
  if (!wallpaperCache || wallpaperCache.w !== W || wallpaperCache.h !== H) {
    wallpaperCache = { cvs: buildWallpaper(), w: W, h: H };
  }
  ctx.drawImage(wallpaperCache.cvs, 0, 0, W, H);
}

// в”Җв”Җв”Җ Dock icons (4 fixed at bottom) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const DOCK_ICONS = [5, 6, 4, 7]; // ж¶ҲжҒҜ, з”өиҜқ, йӮ®д»¶, еҜјиҲӘ
function getDockMetrics() {
  const sc = Math.min(W/390, 1.3);
  const iconSz = Math.round(62*sc);
  const gap    = Math.round(18*sc);
  const pad    = Math.round(14*sc);       // horizontal padding inside dock
  const safeB  = 34*sc;                   // bottom safe area approx
  const dockH  = iconSz + pad*2 + Math.round(4*sc);
  const dockW  = 4*iconSz + 3*gap + pad*2;
  const dockX  = (W - dockW) / 2;
  const dockY  = H - dockH - safeB - Math.round(6*sc);
  return { iconSz, gap, pad, dockH, dockW, dockX, dockY, sc };
}

function drawDock() {
  const m = getDockMetrics();
  const { iconSz, gap, pad, dockH, dockW, dockX, dockY, sc } = m;
  const r = Math.round(20*sc); // corner radius

  // в”Җв”Җ Dock background: frosted glass в”Җв”Җ
  ctx.save();
  // Rounded rect clip
  ctx.beginPath();
  ctx.moveTo(dockX+r, dockY);
  ctx.lineTo(dockX+dockW-r, dockY);
  ctx.quadraticCurveTo(dockX+dockW, dockY, dockX+dockW, dockY+r);
  ctx.lineTo(dockX+dockW, dockY+dockH-r);
  ctx.quadraticCurveTo(dockX+dockW, dockY+dockH, dockX+dockW-r, dockY+dockH);
  ctx.lineTo(dockX+r, dockY+dockH);
  ctx.quadraticCurveTo(dockX, dockY+dockH, dockX, dockY+dockH-r);
  ctx.lineTo(dockX, dockY+r);
  ctx.quadraticCurveTo(dockX, dockY, dockX+r, dockY);
  ctx.closePath();

  // Frosted glass fill
  const dg = ctx.createLinearGradient(dockX, dockY, dockX, dockY+dockH);
  dg.addColorStop(0,   'rgba(255,255,255,0.22)');
  dg.addColorStop(0.5, 'rgba(200,220,255,0.14)');
  dg.addColorStop(1,   'rgba(180,200,255,0.10)');
  ctx.fillStyle = dg;
  ctx.fill();

  // Top highlight line
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();

  // в”Җв”Җ Draw each dock icon + reflection в”Җв”Җ
  DOCK_ICONS.forEach((iconIdx, i) => {
    const ix = dockX + pad + i*(iconSz+gap) + iconSz/2;
    const iy = dockY + pad + iconSz/2;

    // в”Җв”Җ Reflection (offscreen so compositing stays isolated) в”Җв”Җ
    const refH = Math.round(iconSz * 0.45);
    const oc = document.createElement('canvas');
    oc.width = iconSz; oc.height = refH;
    const oc2 = oc.getContext('2d');
    // Draw icon flipped
    oc2.save();
    oc2.translate(0, refH);
    oc2.scale(1, -1);
    oc2.drawImage(iconCache[iconIdx], 0, refH - iconSz, iconSz, iconSz);
    oc2.restore();
    // Fade out with destination-in on offscreen only
    const rfg = oc2.createLinearGradient(0, 0, 0, refH);
    rfg.addColorStop(0,   'rgba(0,0,0,0.30)');
    rfg.addColorStop(0.5, 'rgba(0,0,0,0.10)');
    rfg.addColorStop(1,   'rgba(0,0,0,0)');
    oc2.globalCompositeOperation = 'destination-in';
    oc2.fillStyle = rfg;
    oc2.fillRect(0, 0, iconSz, refH);
    // Draw reflection onto main canvas
    ctx.drawImage(oc, ix - iconSz/2, iy + iconSz*0.52, iconSz, refH);

    // в”Җв”Җ Icon (drawn after reflection so it's on top) в”Җв”Җ
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.5)';
    ctx.shadowBlur=12; ctx.shadowOffsetY=4;
    ctx.drawImage(iconCache[iconIdx], ix-iconSz/2, iy-iconSz/2, iconSz, iconSz);
    ctx.shadowBlur=0; ctx.shadowOffsetY=0;
    ctx.restore();
  });
}

// в”Җв”Җв”Җ Draw one icon в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function drawIcon(idx, x, y, size, angle, alpha){
  ctx.save();
  ctx.globalAlpha = alpha ?? 1;
  ctx.translate(x, y);
  ctx.rotate(angle ?? 0);

  // Icon shadow
  ctx.shadowColor = 'rgba(0,0,0,0.45)';
  ctx.shadowBlur = 10;
  ctx.shadowOffsetY = 3;
  ctx.drawImage(iconCache[idx], -size/2, -size/2, size, size);
  ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

  // iOS-style label: white text with text-shadow, below icon
  ctx.rotate(-(angle ?? 0)); // keep label upright
  const fontSize = Math.round(size * 0.19);
  ctx.font = `500 ${fontSize}px -apple-system,sans-serif`;
  ctx.textAlign = 'center';
  // Text shadow (mimics iOS label)
  ctx.shadowColor = 'rgba(0,0,0,0.6)';
  ctx.shadowBlur = 4;
  ctx.shadowOffsetY = 1;
  ctx.fillStyle = '#fff';
  ctx.fillText(ICONS[idx].label, 0, size / 2 + fontSize * 1.1);
  ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

  ctx.globalAlpha = 1;
  ctx.restore();
}

// в”Җв”Җв”Җ RENDER LOOP в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let rafId=null;
function startRender(){
  if(rafId) return;
  (function loop(){
    rafId=requestAnimationFrame(loop);
    ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
    ctx.clearRect(0,0,W,H);

    // Draw iOS wallpaper background every frame
    drawWallpaper();

    if(mode==='grid'){
      // Draw icons at static home positions
      const homes=homePos(W,H);
      const L=layout(W,H);
      homes.forEach((h,i)=>drawIcon(i,h.x,h.y,L.ic,0,1));

    } else if(mode==='physics' || mode==='homing'){
      // Draw from Matter.js body positions
      const L=layout(W,H);
      iconBodies.forEach(b=>{
        drawIcon(b.iconIdx,b.position.x,b.position.y,L.ic,b.angle,1);
      });
    }

    // Dock always on top
    drawDock();
  })();
}

// в”Җв”Җв”Җ BUILD WALLS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function buildWalls(){
  walls.forEach(w=>World.remove(engine.world,w));
  const T=80;
  const dm = getDockMetrics();
  const floorY = dm.dockY - 4; // floor just above dock
  walls=[
    Bodies.rectangle(W/2, floorY+T/2, W+T*2, T, {isStatic:true,friction:.6,restitution:.3}),
    Bodies.rectangle(W/2, -T/2,       W+T*2, T, {isStatic:true,friction:.6,restitution:.1}),
    Bodies.rectangle(-T/2,  H/2,  T, H+T*2, {isStatic:true,friction:.6,restitution:.3}),
    Bodies.rectangle(W+T/2, H/2,  T, H+T*2, {isStatic:true,friction:.6,restitution:.3}),
  ];
  World.add(engine.world,walls);
}

// в”Җв”Җв”Җ INIT PHYSICS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function initPhysics(){
  if(engine){
    // Already exists вҖ” just rebuild walls for new size
    buildWalls(); return;
  }
  engine=Engine.create({gravity:{x:0,y:1,scale:0.0018}});
  mRunner=Runner.create();
  Runner.run(mRunner,engine);
  buildWalls();

  // Place icon bodies at home positions
  const homes=homePos(W,H);
  const L=layout(W,H);
  iconBodies=ICONS.map((_,i)=>{
    const b=Bodies.rectangle(homes[i].x,homes[i].y,L.ic,L.ic,{
      restitution:.45,
      friction:.55,
      frictionAir:.018,
      density:.002,
      // Start completely static вҖ” gravity will move them once we set it
    });
    b.iconIdx=i;
    return b;
  });
  World.add(engine.world,iconBodies);


  // Magnet force applied each tick
  Events.on(engine,'beforeUpdate',()=>{
    if(!magnetActive||mode!=='physics') return;
    iconBodies.forEach(b=>{
      const dx=magnetX-b.position.x, dy=magnetY-b.position.y;
      const dist=Math.sqrt(dx*dx+dy*dy)+1;
      const f=0.027; // ~30x gravity
      Body.applyForce(b,b.position,{x:(dx/dist)*f*b.mass,y:(dy/dist)*f*b.mass});
    });
  });

  // Collision haptic feedback
  // Android: navigator.vibrate() works perfectly.
  // iOS: Taptic Engine cannot be triggered from JS/PWA вҖ” requires native Swift
  //      UIImpactFeedbackGenerator. No workaround exists in Safari/WKWebView PWA.
  let lastHapticTime = 0;
  function hapticClick(strength) {
    if (!navigator.vibrate) return; // iOS: silently skip
    const now = Date.now();
    if (now - lastHapticTime < 30) return; // throttle ~33/sec max
    lastHapticTime = now;
    // Short grain: 8ms light, 14ms medium, 20ms hard
    const ms = strength > 2 ? 20 : strength > 1 ? 14 : 8;
    navigator.vibrate(ms);
  }

  Events.on(engine,'collisionStart',ev=>{
    ev.pairs.forEach(pair=>{
      const aIsIcon = pair.bodyA.iconIdx !== undefined;
      const bIsIcon = pair.bodyB.iconIdx !== undefined;
      if (!aIsIcon && !bIsIcon) return; // ignore wall-wall
      const vA = pair.bodyA.speed || 0;
      const vB = pair.bodyB.speed || 0;
      const strength = Math.min((vA + vB) / 4, 4);
      if (strength < 0.4) return; // ignore micro-grazes
      hapticClick(strength);
    });
  });

  // Touch drag
  const mouse=Mouse.create(canvas);
  mouse.pixelRatio=devicePixelRatio;
  const mc=MouseConstraint.create(engine,{
    mouse,
    constraint:{stiffness:.3,render:{visible:false}}
  });
  World.add(engine.world,mc);
  // Prevent scroll
  canvas.addEventListener('wheel',e=>e.preventDefault(),{passive:false});
}

// в”Җв”Җв”Җ SWITCH TO PHYSICS MODE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// Icons are already at home positions in the physics world.
// Just switch gravity on and set mode.
function goPhysics(){
  if(!engine) initPhysics();
  // Reset all bodies to home, zero velocity
  const homes=homePos(W,H);
  iconBodies.forEach((b,i)=>{
    Body.setPosition(b,{x:homes[i].x,y:homes[i].y});
    Body.setVelocity(b,{x:0,y:0});
    Body.setAngle(b,0);
    Body.setAngularVelocity(b,0);
  });
  mode='physics';
  // Gravity pulls them down immediately
  engine.gravity.x=0;
  engine.gravity.y=1;
  setBadge('йҮҚеҠӣжЁЎејҸ В· еҖҫж–ңжүӢжңә','rgba(255,255,255,.5)');
}

// в”Җв”Җв”Җ HOME (spring back) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let homingUnsub=null, homingTimeout=null;
function goHome(){
  if(mode==='homing') return;
  mode='homing';
  magnetActive=false;
  engine.gravity.x=0; engine.gravity.y=0;
  const targets=homePos(W,H);
  setBadge('рҹҸ  еҪ’дҪҚдёӯвҖҰ','rgba(255,210,60,.9)');
  if(homingUnsub){Events.off(engine,'beforeUpdate',homingUnsub);homingUnsub=null;}
  clearTimeout(homingTimeout);
  let ticks=0;
  homingUnsub=()=>{
    ticks++;
    let done=true;
    iconBodies.forEach((b,i)=>{
      const dx=targets[i].x-b.position.x, dy=targets[i].y-b.position.y;
      Body.applyForce(b,b.position,{x:dx*.009,y:dy*.009});
      Body.setVelocity(b,{x:b.velocity.x*.82,y:b.velocity.y*.82});
      Body.setAngularVelocity(b,b.angularVelocity*.75);
      Body.setAngle(b,b.angle*.88);
      if(Math.sqrt(dx*dx+dy*dy)>2||Math.abs(b.velocity.x)+Math.abs(b.velocity.y)>.3) done=false;
    });
    if(done||ticks>180) finishHoming(targets);
  };
  Events.on(engine,'beforeUpdate',homingUnsub);
  homingTimeout=setTimeout(()=>finishHoming(targets),3500);
}
function finishHoming(targets){
  if(!homingUnsub) return; // already finished
  Events.off(engine,'beforeUpdate',homingUnsub); homingUnsub=null;
  clearTimeout(homingTimeout);
  iconBodies.forEach((b,i)=>{
    Body.setPosition(b,{x:targets[i].x,y:targets[i].y});
    Body.setVelocity(b,{x:0,y:0});
    Body.setAngle(b,0);
    Body.setAngularVelocity(b,0);
  });
  mode='physics';
  engine.gravity.x=0;
  engine.gravity.y=gyroOn?0:1;
  setBadge(gyroOn?'рҹҢҖ йҷҖиһәд»Ә':'йҮҚеҠӣжЁЎејҸ','rgba(255,255,255,.5)');
}

// в”Җв”Җв”Җ SHAKE ALL в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function shakeAll(){
  if(!engine) return;
  iconBodies.forEach(b=>{
    Body.applyForce(b,b.position,{
      x:(Math.random()-.5)*.12,
      y:(Math.random()-.5)*.12-.05
    });
    Body.setAngularVelocity(b,(Math.random()-.5)*.8);
  });
}

// в”Җв”Җв”Җ GYROSCOPE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function enableGyro(){
  if(!gyroListenerAdded){
    gyroListenerAdded=true;
    // з”Ё devicemotion зҡ„еҺҹе§ӢйҮҚеҠӣеҗ‘йҮҸпјҢжҜ” deviceorientation жӣҙеҮҶзЎ®
    // accelerationIncludingGravity зӣҙжҺҘз»ҷеҮәи®ҫеӨҮеқҗж Үзі»дёӯзҡ„йҮҚеҠӣеҲҶйҮҸ
    // ж— и®әеұҸе№•жңқдёҠ/жңқдёӢ/жЁӘеұҸ/з«–еұҸйғҪиҮӘеҠЁжӯЈзЎ®
    window.addEventListener('devicemotion', e => {
      if (!gyroOn || mode === 'homing' || mode === 'magnet') return;
      const g = e.accelerationIncludingGravity;
      if (!g) return;

      // еұҸе№•еқҗж Үзі»пјҡеҸідёә+XпјҢдёӢдёә+Y
      // devicemotion еқҗж Үзі»пјҡеҸідёә+xпјҢдёҠдёә+yпјҢеұҸе№•еӨ–дёә+z
      // жүҖд»Ҙпјҡgravity.x = g.xпјҲе·ҰеҸіпјүпјҢgravity.y = -g.yпјҲдёҠдёӢеҸ–еҸҚпјү
      // g.z еҶіе®ҡеұҸе№•жңқеҗ‘пјҡжӯЈеҖј=еұҸе№•жңқдёҠпјҢиҙҹеҖј=еұҸе№•жңқдёӢ
      const scale = 1 / 9.8; // еҪ’дёҖеҢ–еҲ° 0~1
      engine.gravity.x =  g.x * scale;
      engine.gravity.y = -g.y * scale;
      // еұҸе№•жңқдёӢж—¶ z дёәиҙҹпјҢйҮҚеҠӣиҮӘз„¶е·Із»ҸеҸҚиҪ¬пјҲеӣ дёә g.x/g.y жң¬иә«е°ұеҸҚдәҶпјү
      // ж— йңҖйўқеӨ–еӨ„зҗҶ
    });
  }
  gyroOn=true;
  document.getElementById('gyroBtn').classList.add('on');
  document.getElementById('gyroBtn').textContent='рҹҢҖ';
  // Auto-start physics immediately вҖ” no need to press рҹҸ 
  if(mode==='grid') goPhysics();
  else setBadge('рҹҢҖ йҷҖиһәд»Ә','rgba(100,220,100,.85)');
}
function disableGyro(){
  gyroOn=false;
  document.getElementById('gyroBtn').classList.remove('on');
  document.getElementById('gyroBtn').textContent='рҹ“ұ';
  if(engine&&mode==='physics'){engine.gravity.x=0;engine.gravity.y=1;}
  if(mode==='physics') setBadge('йҮҚеҠӣжЁЎејҸ','rgba(255,255,255,.5)');
}

// Gyro button
const gyroBtn=document.getElementById('gyroBtn');
const gyroPrompt=document.getElementById('gyro-prompt');
gyroBtn.addEventListener('click',async()=>{
  if(gyroOn){disableGyro();return;}
  if((typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function')||
     (typeof DeviceMotionEvent!=='undefined'&&typeof DeviceMotionEvent.requestPermission==='function')){
    gyroPrompt.classList.add('show');
  } else {
    enableGyro();
  }
});
document.getElementById('gyroAllowBtn').addEventListener('click',async()=>{
  gyroPrompt.classList.remove('show');
  try{
    // iOS 13+ йңҖиҰҒеҗҢж—¶иҜ·жұӮ deviceorientation е’Ң devicemotion жқғйҷҗ
    if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
      await DeviceOrientationEvent.requestPermission();
    }
    if(typeof DeviceMotionEvent!=='undefined'&&typeof DeviceMotionEvent.requestPermission==='function'){
      await DeviceMotionEvent.requestPermission();
    }
    enableGyro();
  }catch(e){enableGyro();}
});
document.getElementById('gyroSkipBtn').addEventListener('click',()=>gyroPrompt.classList.remove('show'));

// Home button вҖ” switches to physics if in grid mode, else homes
document.getElementById('homeBtn').addEventListener('click',()=>{
  if(mode==='grid'){
    goPhysics();
  } else {
    goHome();
  }
});

// Desktop mouse gravity
canvas.addEventListener('mousemove',e=>{
  if(!engine||!gyroOn||mode==='homing') return;
  // On desktop without gyro, mouse position drives gravity
});

// в”Җв”Җв”Җ MAGNET (touch to attract) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function getCanvasPos(e){
  const r=canvas.getBoundingClientRect();
  const src=e.touches?e.touches[0]:e;
  return{x:src.clientX-r.left,y:src.clientY-r.top};
}
canvas.addEventListener('touchstart',e=>{
  if(mode!=='physics') return;
  e.preventDefault();
  const p=getCanvasPos(e);
  magnetActive=true; magnetX=p.x; magnetY=p.y;
  setBadge('рҹ§І зЈҒеҗёдёӯ','rgba(80,220,255,.9)');
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  if(!magnetActive) return;
  e.preventDefault();
  const p=getCanvasPos(e);
  magnetX=p.x; magnetY=p.y;
},{passive:false});
canvas.addEventListener('touchend',e=>{
  magnetActive=false;
  if(mode==='physics') setBadge(gyroOn?'рҹҢҖ йҷҖиһәд»Ә':'йҮҚеҠӣжЁЎејҸ','rgba(255,255,255,.5)');
},{passive:false});
// Desktop: click-hold to magnet
canvas.addEventListener('mousedown',e=>{
  if(mode!=='physics') return;
  const p=getCanvasPos(e);
  magnetActive=true; magnetX=p.x; magnetY=p.y;
  setBadge('рҹ§І зЈҒеҗёдёӯ','rgba(80,220,255,.9)');
});
canvas.addEventListener('mousemove',e=>{
  if(!magnetActive) return;
  const p=getCanvasPos(e);
  magnetX=p.x; magnetY=p.y;
});
canvas.addEventListener('mouseup',()=>{
  magnetActive=false;
  if(mode==='physics') setBadge(gyroOn?'рҹҢҖ йҷҖиһәд»Ә':'йҮҚеҠӣжЁЎејҸ','rgba(255,255,255,.5)');
});

// в”Җв”Җв”Җ SHAKE DETECTION в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let lastAccel={x:0,y:0,z:0},shakeCnt=0,lastShakeT=0;
window.addEventListener('devicemotion',e=>{
  const a=e.accelerationIncludingGravity; if(!a) return;
  const dx=a.x-lastAccel.x,dy=a.y-lastAccel.y,dz=a.z-lastAccel.z;
  const mag=Math.sqrt(dx*dx+dy*dy+dz*dz);
  lastAccel={x:a.x,y:a.y,z:a.z};
  const now=Date.now();
  if(mag>18&&now-lastShakeT>280){
    lastShakeT=now; shakeCnt++;
    if(shakeCnt>=2&&mode!=='grid'&&mode!=='homing'){
      shakeCnt=0; goHome();
      setTimeout(disableGyro,300);
    } else if(shakeCnt===1&&mode==='physics'){
      shakeAll();
      if(!gyroOn) enableGyro();
    }
    setTimeout(()=>{shakeCnt=Math.max(0,shakeCnt-1);},700);
  }
});

// в”Җв”Җв”Җ BADGE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function setBadge(t,c){
  const b=document.getElementById('badge');
  b.textContent=t; b.style.color=c;
}

// в”Җв”Җв”Җ RESIZE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
window.addEventListener('resize',()=>{
  sizeCanvas();
  wallpaperCache=null;
  if(engine) buildWalls();
});

// в”Җв”Җв”Җ START в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
sizeCanvas();
startRender();   // Immediately draws grid (no physics yet)
// Pre-init physics engine in background so first tap is instant
setTimeout(()=>initPhysics(), 400);

// PWA
if(/iphone|ipad|ipod/i.test(navigator.userAgent)&&!window.navigator.standalone){
  document.getElementById('install-bar').style.display='flex';
  document.getElementById('installClose').addEventListener('click',e=>e.target.closest('#install-bar').style.display='none');
}
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
