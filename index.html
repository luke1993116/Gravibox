<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GraviIcons">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>GraviIcons</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root {
    --safe-top: env(safe-area-inset-top, 44px);
    --safe-bottom: env(safe-area-inset-bottom, 34px);
  }
  html, body {
    width:100%; height:100%;
    background:#1a1a2e;
    overflow:hidden;
    font-family:-apple-system,'SF Pro Display',sans-serif;
    touch-action:none;
    user-select:none; -webkit-user-select:none;
  }
  #app { position:fixed; inset:0; display:flex; flex-direction:column; }

  #splash {
    position:fixed; inset:0; background:#1a1a2e;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:16px;
    z-index:100; transition:opacity 0.5s ease, transform 0.5s ease;
  }
  #splash.hide { opacity:0; transform:scale(1.06); pointer-events:none; }
  .sp-grid { display:grid; grid-template-columns:repeat(3,52px); gap:8px; animation:popIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both; }
  @keyframes popIn { from{transform:scale(0.4) rotate(-10deg);opacity:0} to{transform:scale(1) rotate(0);opacity:1} }
  .sp-ic { width:52px; height:52px; border-radius:13px; }
  .sp-title { font-size:30px; font-weight:700; color:#fff; letter-spacing:-0.5px; animation:fadeUp 0.5s 0.3s both; }
  .sp-sub   { font-size:13px; color:rgba(255,255,255,0.4); animation:fadeUp 0.5s 0.45s both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  #header {
    padding:calc(var(--safe-top) + 8px) 18px 8px;
    display:flex; align-items:center; justify-content:space-between; z-index:10;
  }
  #header h1 { font-size:19px; font-weight:700; color:rgba(255,255,255,0.9); letter-spacing:-0.3px; }
  .hbtns { display:flex; gap:8px; }
  .hbtn {
    width:36px; height:36px; border-radius:50%; border:none;
    background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.65);
    font-size:15px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:background 0.15s, transform 0.1s;
  }
  .hbtn:active { background:rgba(255,255,255,0.2); transform:scale(0.9); }
  .hbtn.on { background:rgba(100,180,255,0.25); color:#64b4ff; }

  #canvas-wrap { flex:1; position:relative; overflow:hidden; }
  canvas { display:block; width:100%; height:100%; }

  #footer { padding:6px 20px calc(var(--safe-bottom)+4px); text-align:center; font-size:11px; color:rgba(255,255,255,0.18); }

  #gyro-prompt {
    position:fixed; inset:0; background:rgba(0,0,0,0.7);
    display:flex; align-items:flex-end; justify-content:center;
    padding-bottom:calc(var(--safe-bottom)+20px);
    z-index:50; opacity:0; pointer-events:none; transition:opacity 0.3s;
  }
  #gyro-prompt.show { opacity:1; pointer-events:all; }
  .gp-card { background:#1c1c1e; border-radius:20px; padding:24px 24px 18px; width:calc(100% - 32px); max-width:400px; text-align:center; }
  .gp-icon { font-size:42px; margin-bottom:10px; }
  .gp-title { font-size:18px; font-weight:700; color:#fff; margin-bottom:6px; }
  .gp-desc  { font-size:13px; color:rgba(255,255,255,0.5); margin-bottom:18px; line-height:1.5; }
  .gp-btn { width:100%; padding:13px; border-radius:13px; border:none; background:#4FACFE; color:#fff; font-size:16px; font-weight:600; cursor:pointer; margin-bottom:8px; }
  .gp-skip { background:none; border:none; color:rgba(255,255,255,0.3); font-size:13px; cursor:pointer; padding:6px; }

  #install-bar {
    position:fixed; bottom:calc(var(--safe-bottom)+56px); left:50%; transform:translateX(-50%);
    background:rgba(28,28,30,0.95); border:1px solid rgba(255,255,255,0.1);
    border-radius:14px; padding:10px 16px;
    display:flex; align-items:center; gap:10px; z-index:20;
    max-width:calc(100% - 32px); font-size:12px; color:rgba(255,255,255,0.75);
    white-space:nowrap; animation:slideUp 0.4s 2.5s both;
  }
  @keyframes slideUp { from{opacity:0;transform:translateX(-50%) translateY(16px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
  .ib-close { margin-left:4px; background:none; border:none; color:rgba(255,255,255,0.3); cursor:pointer; font-size:15px; }

  .star { position:absolute; border-radius:50%; background:white; pointer-events:none; }
</style>
</head>
<body>

<div id="splash">
  <div class="sp-grid" id="spGrid"></div>
  <div class="sp-title">GraviIcons</div>
  <div class="sp-sub">倾斜 · 弹跳 · 玩转重力</div>
</div>

<div id="app">
  <div id="header">
    <h1>GraviIcons</h1>
    <div class="hbtns">
      <button class="hbtn" id="gyroBtn">📱</button>
      <button class="hbtn" id="shakeBtn">💨</button>
    </div>
  </div>
  <div id="canvas-wrap"><canvas id="c"></canvas></div>
  <div id="footer">倾斜手机改变重力 · 拖动图标</div>
</div>

<div id="gyro-prompt">
  <div class="gp-card">
    <div class="gp-icon">📱</div>
    <div class="gp-title">开启陀螺仪</div>
    <div class="gp-desc">允许访问设备运动传感器<br>让图标跟随手机真实倾斜滚动</div>
    <button class="gp-btn" id="gyroAllowBtn">允许访问传感器</button>
    <button class="gp-skip" id="gyroSkipBtn">稍后再说</button>
  </div>
</div>

<div id="install-bar" style="display:none">
  <span>⬆️</span>
  <span>分享 → 添加到主屏幕，像 App 一样使用</span>
  <button class="ib-close" id="installClose">✕</button>
</div>

<script>
// ═══ ICON DEFINITIONS ═══════════════════════════════════════
const ICONS = [
  { label:'商店',   grad:['#1a8cff','#0055cc'],  draw: drawStore },
  { label:'音乐',   grad:['#cc44ff','#7700cc'],   draw: drawMusic },
  { label:'相机',   grad:['#888','#444'],          draw: drawCamera },
  { label:'时钟',   grad:['#333','#111'],           draw: drawClock },
  { label:'邮件',   grad:['#55aaff','#1a66cc'],   draw: drawMail },
  { label:'消息',   grad:['#33cc44','#1a8829'],   draw: drawMessage },
  { label:'电话',   grad:['#44cc44','#228822'],   draw: drawPhone },
  { label:'导航',   grad:['#3399ff','#1155bb'],   draw: drawCompass },
  { label:'天气',   grad:['#55aaee','#2277bb'],   draw: drawWeather },
  { label:'设置',   grad:['#888','#555'],          draw: drawSettings },
  { label:'股票',   grad:['#0d2233','#1a4466'],   draw: drawStocks },
  { label:'视频',   grad:['#333','#111'],           draw: drawClapper },
  { label:'地图',   grad:['#77ccff','#bbe8ff'],   draw: drawMap },
  { label:'备忘录', grad:['#ffdd44','#ffaa00'],   draw: drawNotes },
  { label:'播客',   grad:['#aa44ff','#6600cc'],   draw: drawPodcast },
  { label:'通讯录', grad:['#cc9944','#885500'],   draw: drawContacts },
  { label:'照片',   grad:['#ffffff','#dddddd'],   draw: drawPhotos },
  { label:'计算器', grad:['#2a2a2a','#111'],       draw: drawCalculator },
  { label:'健康',   grad:['#ff3366','#cc0044'],   draw: drawHealth },
  { label:'钱包',   grad:['#1a1a1a','#000'],       draw: drawWallet },
  { label:'游戏',   grad:['#ff6633','#cc3300'],   draw: drawGame },
  { label:'雨天',   grad:['#667799','#445566'],   draw: drawRain },
  { label:'图书',   grad:['#ff8833','#cc5500'],   draw: drawBook },
  { label:'手电',   grad:['#222','#000'],           draw: drawFlash },
];

function rc(c,x,y,w,h,r){ c.beginPath(); c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.quadraticCurveTo(x+w,y,x+w,y+r); c.lineTo(x+w,y+h-r); c.quadraticCurveTo(x+w,y+h,x+w-r,y+h); c.lineTo(x+r,y+h); c.quadraticCurveTo(x,y+h,x,y+h-r); c.lineTo(x,y+r); c.quadraticCurveTo(x,y,x+r,y); c.closePath(); c.fill(); }
function circ(c,cx,cy,r,col){ c.beginPath(); c.arc(cx,cy,r,0,Math.PI*2); c.fillStyle=col; c.fill(); }
function ln(c,x1,y1,x2,y2,w,col){ c.beginPath(); c.moveTo(x1,y1); c.lineTo(x2,y2); c.strokeStyle=col; c.lineWidth=w; c.stroke(); }

function drawStore(c,s){
  c.strokeStyle='#fff'; c.lineWidth=s*0.07; c.lineCap='round';
  c.beginPath(); c.arc(s*0.5,s*0.5,s*0.3,0,Math.PI*2); c.stroke();
  c.beginPath(); c.arc(s*0.5,s*0.5,s*0.15,0,Math.PI*2); c.stroke();
  ln(c,s*0.5,s*0.2,s*0.5,s*0.8,s*0.07,'#fff');
  ln(c,s*0.2,s*0.5,s*0.8,s*0.5,s*0.07,'#fff');
}
function drawMusic(c,s){
  c.fillStyle='#fff';
  c.beginPath(); c.ellipse(s*0.36,s*0.65,s*0.1,s*0.08,-0.4,0,Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(s*0.62,s*0.57,s*0.1,s*0.08,-0.4,0,Math.PI*2); c.fill();
  c.fillRect(s*0.44,s*0.28,s*0.045,s*0.38);
  c.fillRect(s*0.7,s*0.22,s*0.045,s*0.36);
  c.fillRect(s*0.44,s*0.26,s*0.3,s*0.07);
}
function drawCamera(c,s){
  c.fillStyle='#bbb'; rc(c,s*0.12,s*0.3,s*0.76,s*0.44,s*0.08);
  c.fillStyle='#aaa'; rc(c,s*0.34,s*0.2,s*0.2,s*0.12,s*0.04);
  c.fillStyle='#eee'; rc(c,s*0.62,s*0.22,s*0.14,s*0.09,s*0.03);
  circ(c,s*0.5,s*0.52,s*0.14,'#555');
  circ(c,s*0.5,s*0.52,s*0.1,'#333');
  circ(c,s*0.5,s*0.52,s*0.06,'#111');
  circ(c,s*0.43,s*0.46,s*0.02,'rgba(255,255,255,0.5)');
}
function drawClock(c,s){
  circ(c,s*0.5,s*0.5,s*0.38,'#fff');
  circ(c,s*0.5,s*0.5,s*0.34,'#f5f5f5');
  c.strokeStyle='#444'; c.lineWidth=s*0.03;
  for(let i=0;i<12;i++){
    const a=i/12*Math.PI*2-Math.PI/2, r1=i%3===0?0.25:0.28;
    ln(c,s*(0.5+Math.cos(a)*r1),s*(0.5+Math.sin(a)*r1),s*(0.5+Math.cos(a)*0.32),s*(0.5+Math.sin(a)*0.32),s*0.03,'#444');
  }
  c.lineCap='round'; c.strokeStyle='#222'; c.lineWidth=s*0.045;
  ln(c,s*0.5,s*0.5,s*(0.5+Math.cos(Math.PI*0.5)*0.18),s*(0.5+Math.sin(Math.PI*0.5)*0.18),s*0.045,'#222');
  ln(c,s*0.5,s*0.5,s*0.5,s*0.22,s*0.04,'#222');
  ln(c,s*0.5,s*0.58,s*0.5,s*0.2,s*0.025,'#ff2200');
  circ(c,s*0.5,s*0.5,s*0.03,'#333');
}
function drawMail(c,s){
  c.fillStyle='#fff'; rc(c,s*0.12,s*0.3,s*0.76,s*0.44,s*0.06);
  c.strokeStyle='#5599ee'; c.lineWidth=s*0.04; c.lineJoin='round';
  c.beginPath(); c.moveTo(s*0.14,s*0.32); c.lineTo(s*0.5,s*0.56); c.lineTo(s*0.86,s*0.32); c.stroke();
}
function drawMessage(c,s){
  c.fillStyle='#fff';
  c.beginPath();
  c.moveTo(s*0.2,s*0.24); c.lineTo(s*0.8,s*0.24);
  c.quadraticCurveTo(s*0.88,s*0.24,s*0.88,s*0.4); c.lineTo(s*0.88,s*0.62);
  c.quadraticCurveTo(s*0.88,s*0.72,s*0.78,s*0.72); c.lineTo(s*0.42,s*0.72);
  c.lineTo(s*0.28,s*0.86); c.lineTo(s*0.3,s*0.72); c.lineTo(s*0.22,s*0.72);
  c.quadraticCurveTo(s*0.12,s*0.72,s*0.12,s*0.62); c.lineTo(s*0.12,s*0.4);
  c.quadraticCurveTo(s*0.12,s*0.24,s*0.2,s*0.24); c.closePath(); c.fill();
}
function drawPhone(c,s){
  c.fillStyle='#fff'; c.save(); c.translate(s*0.5,s*0.5); c.rotate(0.22*Math.PI);
  c.beginPath(); c.ellipse(-s*0.14,-s*0.22,s*0.1,s*0.17,0,0,Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(s*0.14,s*0.22,s*0.1,s*0.17,0,0,Math.PI*2); c.fill();
  c.fillRect(-s*0.08,-s*0.07,s*0.16,s*0.14); c.restore();
}
function drawCompass(c,s){
  circ(c,s*0.5,s*0.5,s*0.36,'rgba(100,180,255,0.25)');
  c.strokeStyle='rgba(255,255,255,0.55)'; c.lineWidth=s*0.04;
  c.beginPath(); c.arc(s*0.5,s*0.5,s*0.34,0,Math.PI*2); c.stroke();
  c.fillStyle='rgba(255,255,255,0.5)'; c.font=`bold ${s*0.11}px sans-serif`; c.textAlign='center';
  c.fillText('N',s*0.5,s*0.22); c.fillText('S',s*0.5,s*0.86);
  c.fillText('E',s*0.83,s*0.55); c.fillText('W',s*0.17,s*0.55);
  c.save(); c.translate(s*0.5,s*0.5); c.rotate(0.6);
  c.fillStyle='#ff4422';
  c.beginPath(); c.moveTo(0,-s*0.24); c.lineTo(s*0.05,0); c.lineTo(0,s*0.06); c.lineTo(-s*0.05,0); c.closePath(); c.fill();
  c.fillStyle='#ddd';
  c.beginPath(); c.moveTo(0,s*0.06); c.lineTo(s*0.05,0); c.lineTo(0,s*0.24); c.lineTo(-s*0.05,0); c.closePath(); c.fill();
  c.restore(); circ(c,s*0.5,s*0.5,s*0.04,'#fff');
}
function drawWeather(c,s){
  c.strokeStyle='#ffcc00'; c.lineWidth=s*0.04; c.lineCap='round';
  for(let i=0;i<8;i++){
    const a=i/8*Math.PI*2;
    ln(c,s*(0.44+Math.cos(a)*0.22),s*(0.46+Math.sin(a)*0.22),s*(0.44+Math.cos(a)*0.3),s*(0.46+Math.sin(a)*0.3),s*0.04,'#ffcc00');
  }
  circ(c,s*0.44,s*0.46,s*0.16,'#ffdd00');
  circ(c,s*0.44,s*0.46,s*0.11,'#ffee55');
  c.fillStyle='#fff'; c.font=`bold ${s*0.16}px sans-serif`; c.textAlign='left';
  c.fillText('23°',s*0.08,s*0.86);
}
function drawSettings(c,s){
  const teeth=8;
  c.fillStyle='#ccc'; c.beginPath();
  for(let i=0;i<teeth;i++){
    const a1=i/teeth*Math.PI*2, a2=(i+0.38)/teeth*Math.PI*2, a3=(i+0.62)/teeth*Math.PI*2, a4=(i+1)/teeth*Math.PI*2;
    if(i===0) c.moveTo(s*(0.5+Math.cos(a1)*0.22),s*(0.5+Math.sin(a1)*0.22));
    c.lineTo(s*(0.5+Math.cos(a1)*0.33),s*(0.5+Math.sin(a1)*0.33));
    c.arc(s*0.5,s*0.5,s*0.33,a1,a2);
    c.lineTo(s*(0.5+Math.cos(a3)*0.22),s*(0.5+Math.sin(a3)*0.22));
    c.arc(s*0.5,s*0.5,s*0.22,a3,a4);
  }
  c.closePath(); c.fill();
  circ(c,s*0.5,s*0.5,s*0.12,'#666');
}
function drawStocks(c,s){
  c.strokeStyle='rgba(255,255,255,0.1)'; c.lineWidth=s*0.015;
  [0.38,0.55,0.72].forEach(y=>{ ln(c,s*0.08,s*y,s*0.9,s*y,s*0.015,'rgba(255,255,255,0.1)'); });
  const pts=[[0.08,0.72],[0.22,0.54],[0.36,0.62],[0.5,0.36],[0.62,0.48],[0.75,0.26],[0.9,0.34]];
  c.strokeStyle='#00ccff'; c.lineWidth=s*0.038; c.lineJoin='round'; c.lineCap='round';
  c.beginPath(); pts.forEach(([x,y],i)=>i?c.lineTo(s*x,s*y):c.moveTo(s*x,s*y)); c.stroke();
  c.lineTo(s*0.9,s*0.88); c.lineTo(s*0.08,s*0.88); c.closePath();
  c.fillStyle='rgba(0,200,255,0.12)'; c.fill();
}
function drawClapper(c,s){
  c.fillStyle='#ddd'; rc(c,s*0.1,s*0.3,s*0.8,s*0.46,s*0.06);
  c.fillStyle='#222'; rc(c,s*0.1,s*0.18,s*0.8,s*0.16,s*0.05);
  c.fillStyle='#ddd';
  for(let i=0;i<4;i++){
    c.save(); c.translate(s*(0.2+i*0.2),s*0.19); c.rotate(-0.32);
    c.fillRect(-s*0.04,-s*0.09,s*0.08,s*0.16); c.restore();
  }
}
function drawMap(c,s){
  c.strokeStyle='rgba(255,255,255,0.8)'; c.lineWidth=s*0.06; c.lineJoin='round';
  c.beginPath(); c.moveTo(s*0.18,s*0.1); c.lineTo(s*0.5,s*0.55); c.lineTo(s*0.82,s*0.1); c.stroke();
  c.beginPath(); c.moveTo(s*0.08,s*0.9); c.lineTo(s*0.5,s*0.55); c.lineTo(s*0.92,s*0.9); c.stroke();
  circ(c,s*0.5,s*0.36,s*0.14,'#ff3344');
  circ(c,s*0.5,s*0.36,s*0.07,'rgba(255,255,255,0.9)');
  c.fillStyle='#ff3344';
  c.beginPath(); c.moveTo(s*0.41,s*0.44); c.lineTo(s*0.59,s*0.44); c.lineTo(s*0.5,s*0.6); c.closePath(); c.fill();
}
function drawNotes(c,s){
  c.fillStyle='#fffde0'; rc(c,s*0.14,s*0.1,s*0.72,s*0.82,s*0.05);
  c.strokeStyle='rgba(200,160,0,0.35)'; c.lineWidth=s*0.022;
  [0.34,0.46,0.58,0.7,0.8].forEach(y=>{ ln(c,s*0.26,s*y,s*0.8,s*y,s*0.022,'rgba(200,160,0,0.35)'); });
  ln(c,s*0.28,s*0.12,s*0.28,s*0.9,s*0.022,'rgba(255,80,80,0.45)');
  c.fillStyle='#8b5e3c'; c.fillRect(s*0.13,s*0.1,s*0.055,s*0.82);
}
function drawPodcast(c,s){
  circ(c,s*0.5,s*0.4,s*0.2,'rgba(255,255,255,0.9)');
  c.strokeStyle='rgba(255,255,255,0.55)'; c.lineWidth=s*0.04; c.lineCap='round';
  [[0.3,-0.85,-0.15],[0.4,-0.82,-0.18],[0.5,-0.78,-0.22]].forEach(([r,a1,a2])=>{
    c.beginPath(); c.arc(s*0.5,s*0.4,s*r,Math.PI*a1,Math.PI*a2); c.stroke();
    c.beginPath(); c.arc(s*0.5,s*0.4,s*r,Math.PI*(1-a2),Math.PI*(1-a1)); c.stroke();
  });
  ln(c,s*0.5,s*0.6,s*0.5,s*0.78,s*0.04,'rgba(255,255,255,0.8)');
  ln(c,s*0.34,s*0.78,s*0.66,s*0.78,s*0.04,'rgba(255,255,255,0.8)');
}
function drawContacts(c,s){
  c.fillStyle='#fff';
  circ(c,s*0.44,s*0.34,s*0.15,'#fff');
  c.beginPath(); c.arc(s*0.44,s*0.82,s*0.26,-Math.PI,0); c.fill();
  ['A','B','C','D','E'].forEach((l,i)=>{
    c.fillStyle='rgba(200,140,60,0.7)'; c.fillRect(s*0.8,s*(0.2+i*0.13),s*0.09,s*0.1);
    c.fillStyle='#fff'; c.font=`${s*0.07}px sans-serif`; c.textAlign='center';
    c.fillText(l,s*0.845,s*(0.285+i*0.13));
  });
}
function drawPhotos(c,s){

// ═══ CANVAS SETUP ═══════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvas-wrap');

let W, H;
const BOX = 64, BRAD = 14;
let gravity = { x: 0, y: 1 };
let boxes = [];
let gyroOn = false;
let dragging = null, lastPos = null;

// Pre-render icons to offscreen canvases
const iconCache = ICONS.map(icon => {
  const oc = document.createElement('canvas');
  const S = BOX * 2; oc.width = oc.height = S;
  const oc2 = oc.getContext('2d');
  const r = S * 0.22;
  // clip to rounded rect
  oc2.beginPath();
  oc2.moveTo(r,0); oc2.lineTo(S-r,0); oc2.quadraticCurveTo(S,0,S,r);
  oc2.lineTo(S,S-r); oc2.quadraticCurveTo(S,S,S-r,S);
  oc2.lineTo(r,S); oc2.quadraticCurveTo(0,S,0,S-r);
  oc2.lineTo(0,r); oc2.quadraticCurveTo(0,0,r,0); oc2.closePath();
  const grd = oc2.createLinearGradient(0,0,0,S);
  grd.addColorStop(0,icon.grad[0]); grd.addColorStop(1,icon.grad[1]);
  oc2.fillStyle=grd; oc2.fill();
  oc2.save(); oc2.clip();
  // shine
  const shine = oc2.createLinearGradient(0,0,0,S*0.52);
  shine.addColorStop(0,'rgba(255,255,255,0.38)'); shine.addColorStop(1,'rgba(255,255,255,0)');
  oc2.fillStyle=shine; oc2.fillRect(0,0,S,S*0.52);
  // draw icon
  icon.draw(oc2, S);
  oc2.restore();
  return oc;
});

// Build splash grid from icon cache
setTimeout(() => {
  const grid = document.getElementById('spGrid');
  if (!grid) return;
  [0,1,2,3,4,5,6,7,8].forEach((i,idx) => {
    const img = document.createElement('canvas');
    img.width = img.height = 52; img.className = 'sp-ic';
    img.style.animationDelay = `${idx*0.05}s`;
    img.getContext('2d').drawImage(iconCache[i],0,0,52,52);
    grid.appendChild(img);
  });
}, 10);

function resize() {
  const rect = wrap.getBoundingClientRect();
  W = rect.width; H = rect.height;
  canvas.width  = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(devicePixelRatio, devicePixelRatio);
}

function initBoxes() {
  const gap = 10, cols = Math.floor((W - 20) / (BOX + gap));
  boxes = ICONS.map((icon, i) => ({
    id: i,
    x: 18 + (i%cols)*(BOX+gap) + BOX/2,
    y: 24 + Math.floor(i/cols)*(BOX+gap) + BOX/2,
    vx: (Math.random()-0.5)*2, vy: 0, angle: 0, av: 0
  }));
}

const RESTITUTION=0.38, FRICTION=0.82, AIR=0.979, GS=13;

function step() {
  const half = BOX/2;
  for (const b of boxes) {
    if (dragging && dragging.id===b.id) continue;
    b.vx += gravity.x*GS*0.016; b.vy += gravity.y*GS*0.016;
    b.vx *= AIR; b.vy *= AIR; b.av *= 0.97;
    b.x += b.vx; b.y += b.vy; b.angle += b.av;
    if(b.x-half<0)  {b.x=half;    b.vx= Math.abs(b.vx)*RESTITUTION; b.vy*=FRICTION; b.av+=b.vy*0.004;}
    if(b.x+half>W)  {b.x=W-half;  b.vx=-Math.abs(b.vx)*RESTITUTION; b.vy*=FRICTION; b.av-=b.vy*0.004;}
    if(b.y-half<0)  {b.y=half;    b.vy= Math.abs(b.vy)*RESTITUTION; b.vx*=FRICTION;}
    if(b.y+half>H)  {b.y=H-half;  b.vy=-Math.abs(b.vy)*RESTITUTION; b.vx*=FRICTION; b.av+=b.vx*0.004;}
  }
  for(let i=0;i<boxes.length;i++) for(let j=i+1;j<boxes.length;j++){
    const a=boxes[i],b=boxes[j],dx=b.x-a.x,dy=b.y-a.y,dist=Math.sqrt(dx*dx+dy*dy),min=BOX*0.88;
    if(dist<min&&dist>0.001){
      const nx=dx/dist,ny=dy/dist,sep=(min-dist)/2;
      if(!dragging||dragging.id!==a.id){a.x-=nx*sep;a.y-=ny*sep;}
      if(!dragging||dragging.id!==b.id){b.x+=nx*sep;b.y+=ny*sep;}
      const rvx=b.vx-a.vx,rvy=b.vy-a.vy,dot=rvx*nx+rvy*ny;
      if(dot<0){const imp=dot*0.62;a.vx+=imp*nx;a.vy+=imp*ny;b.vx-=imp*nx;b.vy-=imp*ny;const sp=(rvx*ny-rvy*nx)*0.003;a.av-=sp;b.av+=sp;}
    }
  }
}

function render() {
  ctx.clearRect(0,0,W,H);
  for (const b of boxes) {
    ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(b.angle);
    ctx.shadowColor='rgba(0,0,0,0.55)';
    ctx.shadowBlur=dragging&&dragging.id===b.id?26:14;
    ctx.shadowOffsetY=3;
    ctx.drawImage(iconCache[b.id],-BOX/2,-BOX/2,BOX,BOX);
    ctx.shadowBlur=0; ctx.shadowOffsetY=0;
    // label
    ctx.fillStyle='rgba(255,255,255,0.82)';
    ctx.font=`${BOX*0.135}px -apple-system,sans-serif`;
    ctx.textAlign='center';
    ctx.fillText(ICONS[b.id].label,0,BOX/2+BOX*0.2);
    ctx.restore();
  }
}

function loop(){ step(); render(); requestAnimationFrame(loop); }

window.addEventListener('resize',()=>{resize();initBoxes();});
resize(); initBoxes();
setTimeout(()=>{
  document.getElementById('splash').classList.add('hide');
  setTimeout(()=>{const s=document.getElementById('splash');if(s)s.remove();},600);
},1900);
loop();

// ═══ INPUT ══════════════════════════════════════════════════
function getPos(e){const rect=canvas.getBoundingClientRect(),src=e.touches?e.touches[0]:e;return{x:src.clientX-rect.left,y:src.clientY-rect.top};}
function findBox(px,py){for(let i=boxes.length-1;i>=0;i--){const b=boxes[i];if(Math.abs(px-b.x)<BOX/2&&Math.abs(py-b.y)<BOX/2)return b;}return null;}

canvas.addEventListener('touchstart',e=>{e.preventDefault();const p=getPos(e);dragging=findBox(p.x,p.y);lastPos=p;},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();if(!dragging)return;const p=getPos(e);dragging.vx=(p.x-lastPos.x)*0.55;dragging.vy=(p.y-lastPos.y)*0.55;dragging.x=p.x;dragging.y=p.y;lastPos=p;},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();if(dragging){dragging.vx*=1.5;dragging.vy*=1.5;dragging=null;}},{passive:false});

canvas.addEventListener('mousemove',e=>{
  if(!e.buttons){if(!gyroOn){const rect=canvas.getBoundingClientRect();gravity.x=((e.clientX-rect.left)/W*2-1)*1.4;gravity.y=((e.clientY-rect.top)/H*2-1)*1.4;}return;}
  if(dragging){const p=getPos(e);dragging.vx=(p.x-dragging.x)*0.55;dragging.vy=(p.y-dragging.y)*0.55;dragging.x=p.x;dragging.y=p.y;}
});
canvas.addEventListener('mousedown',e=>{const p=getPos(e);dragging=findBox(p.x,p.y);});
canvas.addEventListener('mouseup',()=>{if(dragging){dragging.vx*=1.5;dragging.vy*=1.5;dragging=null;}});

document.getElementById('shakeBtn').addEventListener('click',()=>{boxes.forEach(b=>{b.vx=(Math.random()-0.5)*42;b.vy=(Math.random()-0.5)*42;b.av=(Math.random()-0.5)*0.6;});});

// ═══ GYROSCOPE ══════════════════════════════════════════════
const gyroBtn=document.getElementById('gyroBtn');
const gyroPrompt=document.getElementById('gyro-prompt');

function enableGyro(){
  window.addEventListener('deviceorientation',e=>{
    if(!gyroOn)return;
    // gamma: left/right tilt  → x gravity
    // beta:  forward/back tilt → y gravity  (positive beta = top tilts away = gravity DOWN = positive y)
    gravity.x = Math.sin((e.gamma||0)*Math.PI/180)*2;
    gravity.y = Math.sin((e.beta||0)*Math.PI/180)*2;
  });
  gyroOn=true; gyroBtn.classList.add('on'); gyroBtn.textContent='🌀';
}

gyroBtn.addEventListener('click',async()=>{
  if(gyroOn){gyroOn=false;gyroBtn.classList.remove('on');gyroBtn.textContent='📱';gravity={x:0,y:1};return;}
  if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){gyroPrompt.classList.add('show');}
  else enableGyro();
});
document.getElementById('gyroAllowBtn').addEventListener('click',async()=>{
  gyroPrompt.classList.remove('show');
  try{const p=await DeviceOrientationEvent.requestPermission();if(p==='granted')enableGyro();}catch(e){enableGyro();}
});
document.getElementById('gyroSkipBtn').addEventListener('click',()=>gyroPrompt.classList.remove('show'));

if(isIOS&&!window.navigator.standalone){
  const bar=document.getElementById('install-bar');bar.style.display='flex';
  document.getElementById('installClose').addEventListener('click',()=>bar.style.display='none');
}
